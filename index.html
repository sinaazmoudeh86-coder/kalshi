-size: 13px; line-height: 1.4; font-weight: 700; color: #e6e9ef; min-height: 36px;\">{{ s.title }}<\u002Fdiv>\n              <div style=\"display: flex; align-items: center; gap: 8px; flex-wrap: wrap;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: #0d0f13; background: {{ s.sideBg }}; border-radius: 3px; padding: 3px 9px;\">{{ s.side }} {{ s.price }}¢<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #eab54e;\">settles in {{ s.settleIn }}<\u002Fdiv>\n                <button onclick=\"{{ s.copyName }}\" style=\"background: none; border: 1px solid #2a303c; border-radius: 3px; color: #7d8697; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.06em; padding: 2px 8px; cursor: pointer; white-space: nowrap; margin-left: auto;\" style-hover=\"border-color: #3a465c; color: #e6e9ef;\">{{ s.copyLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #20242e; padding-top: 9px;\">\n                <sc-for list=\"{{ s.gates }}\" as=\"g\" hint-placeholder-count=\"5\">\n                  <div style=\"display: grid; grid-template-columns: 14px 88px 1fr auto; gap: 8px; align-items: center;\">\n                    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: {{ g.color }};\">{{ g.icon }}<\u002Fdiv>\n                    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.06em; color: #7d8697;\">{{ g.k }}<\u002Fdiv>\n                    <div style=\"font-size: 10px; color: #5c6474;\">{{ g.label }}<\u002Fdiv>\n                    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ g.color }};\">{{ g.val }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Right column -->\n    <div style=\"display: flex; flex-direction: column; gap: 22px; flex: 1 1 320px; min-width: 300px; max-width: 480px;\">\n\n      <!-- Activity feed -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>ACTIVITY<\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <button onclick=\"{{ copyLog }}\" title=\"Copy the last 24h of activity as plain text\" style=\"background: #1a202b; border: 1px solid #2a303c; border-radius: 3px; color: #aab2c0; font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; padding: 4px 9px; cursor: pointer;\" style-hover=\"background: #232a37; color: #e6e9ef;\">{{ copyLogLabel }}<\u002Fbutton>\n            <div style=\"display: flex; align-items: center; gap: 6px;\">\n            <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #4fce7f; display: inline-block; animation: kpdPulse 1.2s ease-in-out infinite;\"><\u002Fspan>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #7d8697;\">sweeping every 5s<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height: 2px; background: #1d232e; border-radius: 1px; overflow: hidden; margin-bottom: 12px;\">\n          <div style=\"height: 100%; width: 30%; background: linear-gradient(90deg, transparent, #4fce7f); animation: kpdSweep 5s linear infinite;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ eventsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #5c6474;\">warming up…<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 7px; max-height: 250px; overflow-y: auto;\">\n          <sc-for list=\"{{ events }}\" as=\"e\" hint-placeholder-count=\"5\">\n            <div style=\"display: grid; grid-template-columns: 50px 14px 1fr; gap: 6px; align-items: start;\">\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; color: #4a5261; padding-top: 1px;\">{{ e.time }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ e.color }};\">{{ e.icon }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #8b93a3; line-height: 1.45; overflow-wrap: anywhere;\">{{ e.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Portfolio money flow -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>KALSHI PORTFOLIO · MONEY FLOW<\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #7d8697;\">{{ pvSpanLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;\">\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #4fce7f;\">TOTAL VALUE<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #4fce7f;\">{{ pvTotNow }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #5aa7e8;\">CASH<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #5aa7e8;\">{{ pvCashNow }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #eab54e;\">PORTFOLIO · BETS<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #eab54e;\">{{ pvRiskNow }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ pvHas }}\" hint-placeholder-val=\"{{ false }}\">\n          <svg viewBox=\"0 0 100 42\" preserveAspectRatio=\"none\" style=\"width: 100%; height: 130px; display: block;\">\n            <polygon points=\"{{ pvTotPoly }}\" fill=\"rgba(234, 181, 78, 0.32)\" stroke=\"none\"><\u002Fpolygon>\n            <polygon points=\"{{ pvCashPoly }}\" fill=\"rgba(90, 167, 232, 0.30)\" stroke=\"none\"><\u002Fpolygon>\n            <polyline points=\"{{ pvLine }}\" fill=\"none\" stroke=\"#4fce7f\" stroke-width=\"0.9\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n          <\u002Fsvg>\n          <div style=\"display: flex; justify-content: space-between; margin-top: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #7d8697;\">\n            <div>{{ pvStartLabel }}<\u002Fdiv>\n            <div><span style=\"color: #5aa7e8;\">■ cash<\u002Fspan> <span style=\"color: #eab54e;\">■ in bets (at cost)<\u002Fspan> <span style=\"color: #4fce7f;\">— total<\u002Fspan><\u002Fdiv>\n            <div>now<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ pvEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding: 18px 0 8px 0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697; text-align: center;\">Collecting samples — the flow chart draws itself once the live connection has been up a minute.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Account sync state -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>ACCOUNT SYNC · KALSHI ↔ DESK<\u002Fdiv>\n          <button onclick=\"{{ syncNow }}\" style=\"background: none; border: 1px solid #2a303c; border-radius: 3px; color: #7d8697; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.06em; padding: 4px 10px; cursor: pointer;\" style-hover=\"border-color: #5aa7e8; color: #5aa7e8;\">⟳ SYNC NOW<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 12px;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: {{ syncMatchColor }}; background: {{ syncMatchBg }}; border-radius: 3px; padding: 3px 10px;\">{{ syncMatch }}<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ syncAgoColor }};\">last sync {{ syncAgo }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;\">\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697;\">KALSHI OPEN<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600;\">{{ syncK }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697;\">DESK OPEN<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600;\">{{ syncD }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697;\">FILLS SEEN<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #8b93a3;\">{{ syncFills }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697;\">SETTLEMENTS<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #8b93a3;\">{{ syncSetts }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ syncHasErr }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #e5636a;\">{{ syncErr }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Bankroll chart -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>BANKROLL<\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: {{ pnlColor }};\">{{ pnlPct }}<\u002Fdiv>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 100 42\" preserveAspectRatio=\"none\" style=\"width: 100%; height: 120px; display: block;\">\n          <line x1=\"0\" y1=\"{{ baselineY }}\" x2=\"100\" y2=\"{{ baselineY }}\" stroke=\"#2a303c\" stroke-width=\"0.4\" stroke-dasharray=\"1.5 1.5\"><\u002Fline>\n          <polyline points=\"{{ curvePoints }}\" fill=\"none\" stroke=\"{{ curveColor }}\" stroke-width=\"0.9\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n        <\u002Fsvg>\n        <div style=\"display: flex; justify-content: space-between; margin-top: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #7d8697;\">\n          <div>start {{ startLabel }}<\u002Fdiv>\n          <div>{{ settledCountLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Selection model -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700; margin-bottom: 12px;\">SELECTION MODEL<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <sc-for list=\"{{ modelWeights }}\" as=\"w\" hint-placeholder-count=\"3\">\n            <div style=\"display: flex; flex-direction: column; gap: 4px;\">\n              <div style=\"display: flex; justify-content: space-between;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #e6e9ef;\">{{ w.name }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #7d8697;\">{{ w.pct }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"height: 4px; background: #1d222c; border-radius: 2px; overflow: hidden;\">\n                <div style=\"height: 100%; width: {{ w.pct }}; background: #57c8c0; border-radius: 2px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size: 10px; letter-spacing: 0.1em; color: #7d8697; font-weight: 700; margin: 14px 0 8px 0;\">CATEGORY FORM (LEARNED)<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n          <sc-for list=\"{{ catBoosts }}\" as=\"b\" hint-placeholder-count=\"6\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ b.color }}; border: 1px solid #232936; border-radius: 3px; padding: 2px 7px;\">{{ b.name }} ×{{ b.mult }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size: 10px; letter-spacing: 0.1em; color: #7d8697; font-weight: 700; margin: 14px 0 8px 0;\">LEARNING MODULE · ADAPTS FROM EVERY RESULT<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <sc-for list=\"{{ learnLines }}\" as=\"ll\" hint-placeholder-count=\"3\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ ll.color }}; line-height: 1.5;\">{{ ll.text }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 14px 0 8px 0;\">\n          <div style=\"font-size: 10px; letter-spacing: 0.1em; color: #e5636a; font-weight: 700;\">LOSER LOG · SNAPSHOT AT ENTRY<\u002Fdiv>\n          <div onclick=\"{{ copyLoserLog }}\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #aab2c0; border: 1px solid #232936; border-radius: 3px; padding: 2px 8px; cursor: pointer; user-select: none; white-space: nowrap;\" style-hover=\"color: #e6e9ef; border-color: #3a465c;\">{{ copyLoserLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ noLosers }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #7d8697;\">No losses yet.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <sc-for list=\"{{ loserRows }}\" as=\"lr\" hint-placeholder-count=\"2\">\n            <div style=\"background: #10141a; border: 1px solid #2c1518; border-radius: 4px; padding: 7px 9px; display: flex; flex-direction: column; gap: 3px;\">\n              <div style=\"display: flex; justify-content: space-between; gap: 10px; align-items: baseline;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #e6e9ef;\">{{ lr.title }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: #e5636a; white-space: nowrap;\">{{ lr.pnl }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #aab2c0; line-height: 1.6;\">{{ lr.detail }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #7d8697; line-height: 1.6;\">{{ lr.meta }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #5c6474; line-height: 1.6;\">{{ lr.snap }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ loserOverflow }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #5c6474; margin-top: 6px;\">{{ loserOverflowNote }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font-size: 10px; color: #5c6474; line-height: 1.5; margin-top: 12px;\">{{ candCount }} positions re-scored every 5 seconds. A $25 bet fires the moment all 11 gates pass: settles in 5–60 min (SPORTS: 18h watchlist, entries only T−6h → T−45m, main lines only — no exotic props, max 2 held), 70–92¢ favorite band (SPORTS: 75–94¢ favorites, +1.5¢ extra below 80¢, spread ≤ 4¢, no sharp odds moves, −0.5¢ credit when the line steams toward the side; CRYPTO: no holds over 4h below 90¢), 24h volume ≥ $100 ($500 for sports), net edge ≥ +2.5¢ after Kalshi fees (~7% × p × (1−p) per contract), composite score ≥ 60 (win odds × income × category form), and not already holding the market. CRYPTO — all coins (HYPE/BNB/ZEC/SHIB included, not just BTC/ETH): no 93¢+ entries ever, +2.5¢ extra edge overnight (2–7am ET). Threshold AND price-range markets inside 1h need a ≥93¢ cushion or a dead-calm aligned tape. Whipsaw guard: any loss cools its underlying series for 1h. No cap on concurrent bets (sports: max 2).<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Scanner health funnel -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700; margin-bottom: 4px;\">SCANNER HEALTH · SIGNAL FUNNEL<\u002Fdiv>\n        <div style=\"font-size: 10px; color: #5c6474; line-height: 1.5; margin-bottom: 12px;\">Per category: candidates scored this sweep, how many pass all 11 gates, and the gate rejecting the most.<\u002Fdiv>\n        <sc-if value=\"{{ scanFunnelEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">Nothing scored yet — waiting for the feed.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n          <sc-for list=\"{{ scanFunnel }}\" as=\"fn\" hint-placeholder-count=\"4\">\n            <div style=\"display: flex; justify-content: space-between; gap: 10px; background: #10141a; border: 1px solid #1d232e; border-radius: 4px; padding: 6px 9px;\">\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; color: {{ fn.color }};\">{{ fn.name }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: {{ fn.qColor }};\">{{ fn.line }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Market watch: category tabs over everything being scanned -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700; margin-bottom: 4px;\">MARKET WATCH · EVERYTHING SCANNED<\u002Fdiv>\n        <div style=\"font-size: 10px; color: #5c6474; line-height: 1.5; margin-bottom: 12px;\">Favorite side of every Kalshi market being watched. Pick a category — grey bubble is how many are watched, green is how many qualify right now.<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;\">\n          <sc-for list=\"{{ watchTabs }}\" as=\"wt\" hint-placeholder-count=\"7\">\n            <div onclick=\"{{ wt.onClick }}\" style=\"display: flex; align-items: center; gap: 6px; background: {{ wt.bg }}; border: 1px solid {{ wt.border }}; border-radius: 4px; padding: 5px 9px; cursor: pointer; user-select: none;\" style-hover=\"border-color: #3a465c;\">\n              <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; color: {{ wt.color }};\">{{ wt.name }}<\u002Fspan>\n              <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; color: #aab2c0; background: #1d222c; border-radius: 8px; padding: 1px 6px;\">{{ wt.count }}<\u002Fspan>\n              <sc-if value=\"{{ wt.hasQ }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; color: #0d0f13; background: #4fce7f; border-radius: 8px; padding: 1px 6px;\">{{ wt.qCount }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ watchEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">No markets watched in this category right now.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 6px; max-height: 420px; overflow-y: auto;\">\n          <sc-for list=\"{{ watchRows }}\" as=\"wr\" hint-placeholder-count=\"6\">\n            <div style=\"background: #10141a; border: 1px solid #1d232e; border-radius: 4px; padding: 7px 9px; display: flex; flex-direction: column; gap: 3px;\">\n              <div style=\"display: flex; align-items: baseline; gap: 8px;\">\n                <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8px; font-weight: 700; color: {{ wr.catColor }}; letter-spacing: 0.06em;\">{{ wr.cat }}<\u002Fspan>\n                <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #e6e9ef;\">{{ wr.title }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #7d8697;\">{{ wr.quote }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; color: {{ wr.statusColor }};\">{{ wr.status }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ watchMoreHas }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #5c6474; margin-top: 8px;\">{{ watchMore }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Category breakdown -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700; margin-bottom: 14px;\">HIT RATE BY CATEGORY<\u002Fdiv>\n        <sc-if value=\"{{ noStats }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">No settled bets yet.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n          <sc-for list=\"{{ catStats }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"display: flex; flex-direction: column; gap: 5px;\">\n              <div style=\"display: flex; justify-content: space-between; align-items: baseline;\">\n                <div style=\"font-size: 11px; color: {{ c.color }}; font-weight: 700; letter-spacing: 0.06em;\">{{ c.name }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8b93a3;\">{{ c.record }} · <span style=\"color: {{ c.pnlColor }};\">{{ c.pnl }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"height: 5px; background: #1d222c; border-radius: 3px; overflow: hidden;\">\n                <div style=\"height: 100%; width: {{ c.barW }}; background: {{ c.color }}; border-radius: 3px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Strategy breakdown -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700; margin-bottom: 14px;\">STRATEGY PERFORMANCE<\u002Fdiv>\n        <sc-if value=\"{{ noStats }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">No settled bets yet.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <sc-for list=\"{{ stratStats }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #1a1f28; padding-bottom: 9px;\">\n              <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #e6e9ef;\">{{ s.name }}<\u002Fdiv>\n                <div style=\"font-size: 10px; color: #7d8697;\">{{ s.record }} · {{ s.rate }} hit<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: {{ s.pnlColor }};\">{{ s.pnl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Live trading -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>LIVE TRADING<\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: {{ liveChipColor }}; background: {{ liveChipBg }}; border-radius: 3px; padding: 2px 8px;\">{{ liveChip }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ engineColor }}; line-height: 1.5; margin-bottom: 10px;\">{{ engineLine }}<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;\">\n          <div style=\"background: #10141a; border: 1px solid #1d232e; border-radius: 4px; padding: 10px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697; margin-bottom: 4px;\">KALSHI BALANCE<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #e6e9ef;\">{{ liveBalance }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #10141a; border: 1px solid #1d232e; border-radius: 4px; padding: 10px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697; margin-bottom: 4px;\">TODAY (LIVE BETS)<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: {{ livePnlTodayColor }};\">{{ livePnlTodayLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ liveDisarmed }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ armLive }}\" style=\"width: 100%; background: none; border: 1px solid #3a465c; border-radius: 4px; color: #e6e9ef; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; padding: 10px; cursor: pointer;\" style-hover=\"background: #1d2430;\">ARM LIVE TRADING<\u002Fbutton>\n          <div style=\"font-size: 10px; color: #5c6474; line-height: 1.5; margin-top: 8px;\">Requires the api/trade.js function deployed with KALSHI_ACCESS_KEY, KALSHI_PRIVATE_KEY and TRADE_SECRET env vars set on Vercel. Orders are $25 limit-at-ask, signed server-side; your key never touches the browser.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ liveArmed }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ stopLive }}\" style=\"width: 100%; background: #e5636a; border: 1px solid #e5636a; border-radius: 4px; color: #0d0f13; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; padding: 10px; cursor: pointer;\">■ STOP — DISARM NOW<\u002Fbutton>\n          <div style=\"font-size: 10px; color: #8b93a3; line-height: 1.5; margin-top: 8px;\">{{ liveCapLabel }}<\u002Fdiv>\n          <div style=\"font-size: 10px; color: #e5636a; line-height: 1.5; margin-top: 2px;\">{{ liveStatusErr }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Market pool -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>MARKET POOL<\u002Fdiv>\n          <button onclick=\"{{ toggleEditor }}\" style=\"background: none; border: 1px solid #2a303c; border-radius: 3px; color: #7d8697; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; padding: 3px 10px; cursor: pointer;\" style-hover=\"border-color: #3a465c; color: #e6e9ef;\">{{ editorBtnLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">{{ poolSummary }}<\u002Fdiv>\n        <div style=\"margin-top: 8px; display: flex; flex-direction: column; gap: 3px;\">\n          <sc-for list=\"{{ feedDiag }}\" as=\"d\" hint-placeholder-count=\"2\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; color: #5c6474; line-height: 1.4;\">{{ d.line }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ editorOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-direction: column; gap: 8px; margin-top: 10px;\">\n            <div style=\"font-size: 10px; color: #8b93a3; line-height: 1.5;\">Paste the real markets you see on kalshi.com, one per line:<br>Market question | YES price in ¢ | category | minutes to close (≤60)<\u002Fdiv>\n            <textarea value=\"{{ editorText }}\" onchange=\"{{ onEditorChange }}\" style=\"width: 100%; height: 150px; background: #0d0f13; border: 1px solid #2a303c; border-radius: 4px; color: #e6e9ef; font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.5; padding: 8px; resize: vertical; box-sizing: border-box;\"><\u002Ftextarea>\n            <div style=\"display: flex; gap: 8px;\">\n              <button onclick=\"{{ saveEditor }}\" style=\"background: #4fce7f; border: 1px solid #4fce7f; border-radius: 3px; color: #0d0f13; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; padding: 6px 12px; cursor: pointer;\">USE THESE MARKETS<\u002Fbutton>\n              <button onclick=\"{{ clearCustom }}\" style=\"background: none; border: 1px solid #2a303c; border-radius: 3px; color: #7d8697; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; padding: 6px 12px; cursor: pointer;\" style-hover=\"border-color: #3a465c; color: #e6e9ef;\">REVERT TO AUTO<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"font-size: 10px; color: #5c6474; line-height: 1.5; padding: 0 4px;\">{{ dataNote }} Settlement uses real Kalshi results when the feed provides them (✓ in the log), with odds-based simulation as fallback. Paper trading only — not financial advice.<\u002Fdiv>\n    <\u002Fdiv>\n\n      <!-- Bet log (full-width ledger) -->\n      <div style=\"flex: 1 1 100%; min-width: 0;\">\n        <div style=\"display: flex; align-items: stretch; gap: 8px; flex-wrap: wrap; margin: 0 0 12px 0;\">\n          <sc-for list=\"{{ pipeStages }}\" as=\"ps\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ ps.onClick }}\" style=\"flex: 1 1 190px; text-align: left; background: {{ ps.bg }}; border: 1px solid {{ ps.border }}; border-radius: 8px; padding: 10px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 3px;\" style-hover=\"border-color: #3a465c;\">\n              <div style=\"font-size: 9px; letter-spacing: 0.1em; color: {{ ps.labelColor }}; font-weight: 700;\">{{ ps.label }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: #e6e9ef;\">{{ ps.value }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #7d8697;\">{{ ps.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 10px 0;\">\n          <div style=\"display: flex; align-items: center; gap: 14px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px; font-size: 12px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 13px; background: #4fce7f; border-radius: 2px; display: inline-block;\"><\u002Fspan>LEDGER · THE BETTING PROCESS<\u002Fdiv>\n            <div style=\"display: flex; gap: 4px;\">\n              <sc-for list=\"{{ logTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ t.onClick }}\" style=\"background: {{ t.bg }}; border: 1px solid {{ t.border }}; border-radius: 3px; color: {{ t.color }}; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; padding: 3px 10px; cursor: pointer;\" style-hover=\"border-color: #3a465c;\">{{ t.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <div style=\"display: flex; align-items: center; gap: 3px;\" title=\"last 20 settled results, oldest → newest\">\n              <sc-for list=\"{{ streakDots }}\" as=\"sd\" hint-placeholder-count=\"8\">\n                <span style=\"width: 7px; height: 7px; border-radius: 2px; background: {{ sd.c }}; display: inline-block;\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">{{ logSummary }}<\u002Fdiv>\n            <button onclick=\"{{ resetLog }}\" style=\"background: none; border: 1px solid #2a303c; border-radius: 3px; color: #7d8697; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.08em; padding: 4px 10px; cursor: pointer;\" style-hover=\"border-color: #e5636a; color: #e5636a;\">RESET<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); overflow-x: auto;\">\n          <div style=\"display: grid; grid-template-columns: 110px minmax(260px, 1.7fr) 124px 112px 64px 132px 92px; gap: 14px; padding: 9px 16px; border-bottom: 1px solid #232936; font-size: 9px; letter-spacing: 0.1em; color: #7d8697; font-weight: 700; min-width: 900px;\">\n            <div>TIME<\u002Fdiv><div>MARKET<\u002Fdiv><div>POSITION<\u002Fdiv><div>STRATEGY<\u002Fdiv><div style=\"text-align: right;\">STAKE<\u002Fdiv><div style=\"text-align: center;\">RESULT<\u002Fdiv><div style=\"text-align: right;\">P&amp;L<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"max-height: 430px; overflow-y: auto;\">\n            <sc-if value=\"{{ logEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding: 28px 16px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #7d8697;\">Nothing here yet — the scanner is hunting for qualifying entries.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ logRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div style=\"display: grid; grid-template-columns: 110px minmax(260px, 1.7fr) 124px 112px 64px 132px 92px; gap: 14px; padding: 10px 16px; border-bottom: 1px solid #1a1f28; font-size: 12.5px; align-items: center; min-width: 900px;\" style-hover=\"background: #171c25;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">{{ r.time }}<\u002Fdiv>\n                <div style=\"color: #cfd4dd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\" title=\"{{ r.full }}\">{{ r.title }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: {{ r.sideColor }};\">{{ r.sideAt }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #8b93a3;\">{{ r.strat }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-align: right; color: #8b93a3;\">$25<\u002Fdiv>\n                <div style=\"display: flex; align-items: center; justify-content: center;\">\n                  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: {{ r.resultColor }}; background: {{ r.resultBg }}; border-radius: 3px; padding: 2px 8px;\">{{ r.result }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; text-align: right; color: {{ r.pnlColor }};\">{{ r.pnl }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 10px; color: #5c6474; margin-top: 8px; line-height: 1.5;\">Fully automated — the scanner places entries, settles them at market close, and updates P&amp;L, hit rate and bankroll on its own. No input needed.<\u002Fdiv>\n      <\u002Fdiv>\n\n\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startingBankroll&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 500, &quot;min&quot;: 100, &quot;max&quot;: 10000, &quot;unit&quot;: &quot;$&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Desk settings&quot;}}\">\nclass Component extends DCLogic {\n  state = { now: Date.now(), rev: 0, filter: \"all\", editorOpen: false, editorText: \"\", copiedId: null, pw: \"\", pwErr: false, auth: (() => { try { return localStorage.getItem(\"kpd-auth\") === \"ok\"; } catch (e) { return false; } })() };\n  KEY = \"kpd-live-log-v1\";\n  POOL_KEY = \"kpd-pool-v1\";\n  SNAPSHOT_LABEL = \"JUL 4, 2026\";\n\n  componentDidMount() {\n    this.loadLog();\n    document.addEventListener(\"visibilitychange\", () => {\n      if (!document.hidden && this.liveCfg && this.liveCfg.secret && Date.now() - (this.pfSynced || 0) > 10000) {\n        this.lastPf = Date.now(); this.lastBal = Date.now();\n        this.syncPortfolio(); this.fetchStatus();\n      }\n    });\n    try { this.liveCfg = JSON.parse(localStorage.getItem(\"kpd-live-v1\") || \"null\"); } catch (e) { this.liveCfg = null; }\n    this.dataMode = \"connecting\";\n    this.fetchLive();\n    this.tick();\n    this.timer = setInterval(() => this.tick(), 1000);\n  }\n  componentWillUnmount() { clearInterval(this.timer); clearTimeout(this.refetchT); clearTimeout(this.copyT); }\n\n  tick() {\n    const now = Date.now();\n    if (this.liveCfg && this.liveCfg.armed && !this._wl && !this._wlFail && navigator.wakeLock) {\n      this._wl = true;\n      navigator.wakeLock.request(\"screen\").then(l => { l.addEventListener(\"release\", () => { this._wl = false; }); }).catch(() => { this._wl = false; this._wlFail = true; });\n    }\n    if (this.liveCfg && this.liveCfg.secret && now - (this.lastEng || 0) > 20000) { this.lastEng = now; this.pollEngine(); }\n    if (this.liveCfg && this.liveCfg.secret && now - (this.lastBal || 0) > 15000) { this.lastBal = now; this.fetchStatus(); }\n    if (this.isServerMode()) { this.setState({ now }); return; } // server engine owns the trading loop\n    if (this.dataMode === \"live\" && now - (this.lastQHot || 0) > 15000) { this.lastQHot = now; this.fetchQuotes(true); }\n    if (this.dataMode === \"live\" && now - (this.lastQ || 0) > 60000) { this.lastQ = now; this.fetchQuotes(false); }\n    if (this.liveCfg && this.liveCfg.secret && now - (this.lastPf || 0) > 30000) { this.lastPf = now; this.syncPortfolio(); }\n    let dirty = this.settleDue(now);\n    dirty = this.scan(now) || dirty;\n    if (dirty) this.save();\n    this.setState({ now });\n  }\n\n  rng(seed) {\n    let t = seed >>> 0;\n    return () => {\n      t += 0x6D2B79F5;\n      let r = Math.imul(t ^ (t >>> 15), 1 | t);\n      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;\n      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;\n    };\n  }\n\n  // ONE authoritative crypto matcher (Jul 7 24h-log review): HYPE, BNB, ZEC and\n  // SHIB markets were categorized \"MARKET\", dodging every crypto guard — the 93¢+\n  // ban (they slipped through the final-10-min 93–98¢ exception meant for\n  // non-crypto: HYPE @ 97¢ and BNB @ 95–96¢ reached the order stage), the\n  // near-strike gamma zone, the 90-min stand-down, the overnight premium, crypto\n  // slot caps, the adjacent-strike dedupe, and the learning module's CRYPTO\n  // bucket (crypto results were split 26–4 vs 39–3 across two buckets).\n  // Word-bounded / KX-prefixed where substrings would misfire (NEVADA≠ADA,\n  // WHETHER≠ETH, LAWSUIT≠SUI).\n  isCryptoTk(t) {\n    t = (t || \"\").toUpperCase();\n    return /BTC|KXETH|ETHEREUM|\\bETH\\b|KXSOL|SOLANA|\\bSOL\\b|XRP|RIPPLE|DOGE|CRYPTO|BITCOIN|\\bHYPE\\b|KXHYPE|BNB|ZEC|SHIB|LITECOIN|\\bLTC\\b|CARDANO|KXADA|AVAX|CHAINLINK|KXLINK|\\bXLM\\b|KXTRX|\\bTRX\\b|PEPE|KXSUI|KXAPT|KXNEAR|KXBCH|MONERO|KXXMR|POLYGON|KXMATIC|KXBONK/.test(t);\n  }\n\n  tickerCat(t) {\n    t = (t || \"\").toUpperCase();\n    if (this.isCryptoTk(t)) return \"CRYPTO\";\n    if (/FED|CPI|GDP|JOBS|CLAIMS|PAYROLL|RATE|INX|NASDAQ|S&P|TNOTE|RECESSION|INFLATION/.test(t)) return \"ECON\";\n    if (/OIL|GAS|GOLD|SILVER|WTI|BRENT|COMMOD/.test(t)) return \"COMMOD\";\n    if (/ELECTION|PRESIDENT|SENATE|GOVERNOR|CONGRESS|NOMINEE|PRIMARY|POLITIC|WHITE HOUSE|SUPREME COURT/.test(t)) return \"POLITICS\";\n    if (/HIGH|LOW|RAIN|SNOW|TEMP|STORM|HURR/.test(t)) return \"WEATHER\";\n    if (/SPORT|NBA|NFL|MLB|NHL|SOCCER|WC26|FIFWC|FIFA|UFC|TENNIS|GOLF|F1|MATCH|GAME|WORLD CUP|CHAMPION|EXACT SCORE|SPREAD:|O\\/U |OVER\\/UNDER|\\bVS\\.?\\b|1ST HALF|FIRST HALF|GOALSCORER|CORNERS|PREMIER LEAGUE|LA LIGA|SERIE A|BUNDESLIGA|GRAND PRIX|HOME RUN|TOUCHDOWN/.test(t)) return \"SPORTS\";\n    return \"MARKET\";\n  }\n\n  async fetchJson(url, ms) {\n    const ctrl = new AbortController();\n    const t = setTimeout(() => ctrl.abort(), ms || 10000);\n    try {\n      const r = await fetch(url, { signal: ctrl.signal });\n      if (!r.ok) throw new Error(\"HTTP \" + r.status);\n      return await r.json();\n    } finally { clearTimeout(t); }\n  }\n\n  // Live pools keep only markets settling within 75 minutes (sub-1h desk).\n  mapKalshi(j) {\n    const nowT = Date.now();\n    const num = v => { const n = parseFloat(v); return isFinite(n) ? n : 0; };\n    const cents = (c, d) => { const n = num(c); if (n > 0) return Math.round(n); return Math.round(num(d) * 100); };\n    const mapped = (j.markets || [])\n      .filter(m => !m.status || m.status === \"active\")\n      .filter(m => !m.mve_collection_ticker && !(m.ticker || \"\").includes(\"KXMVE\") && !(m.event_ticker || \"\").includes(\"KXMVE\"))\n      // weather RE-ENABLED (v97) under the post-peak lock-in model — see domainLogic\n      .map(m => {\n        const bid = cents(m.yes_bid, m.yes_bid_dollars);\n        const ask = cents(m.yes_ask, m.yes_ask_dollars) || 100;\n        const last = cents(m.last_price, m.last_price_dollars);\n        const yes = last > 0 ? last : Math.round((bid + ask) / 2);\n        const closeTs = new Date(m.close_time).getTime();\n        const vol = num(m.volume_24h) || num(m.volume_24h_fp) || num(m.volume) || num(m.volume_fp) || num(m.liquidity_dollars);\n        return {\n          t: (m.title || m.ticker) + (m.yes_sub_title && m.yes_sub_title.length < 60 ? \" \\u2014 \" + m.yes_sub_title : \"\"),\n          ticker: m.ticker || \"\",\n          c: m._evcat || this.tickerCat(m.ticker + \" \" + (m.title || \"\")),\n          src: \"KALSHI\",\n          yes, closeTs, vol, _bid: bid, _ask: ask\n        };\n      })\n      .filter(m => m.yes >= 5 && m.yes <= (m.c === \"WEATHER\" ? 96 : 95) && m.closeTs - nowT > 4 * 60000 && m.closeTs - nowT < ((m.c === \"SPORTS\" ? 1080 : m.c === \"WEATHER\" ? 300 : this.horizonMins()) + 125) * 60000);\n    // primary: real traded volume OR a real two-sided book (fresh fast markets start\n    // at ~$0 volume but carry tight live quotes); last resort: any quoted market\n    let pool = mapped.filter(m => m.vol > 50 || (m._bid >= 3 && m._ask <= 97 && m._ask - m._bid <= 10));\n    if (pool.length < 3) pool = mapped.filter(m => m._bid > 0 && m._ask < 100);\n    // per-category quotas sized for full-universe watching — thousands of markets,\n    // no category able to crowd out another\n    const sorted = pool.sort((a, b) => b.vol - a.vol);\n    const sports = sorted.filter(m => m.c === \"SPORTS\").slice(0, 600);\n    const crypto = sorted.filter(m => m.c === \"CRYPTO\").slice(0, 400);\n    const other = sorted.filter(m => m.c !== \"SPORTS\" && m.c !== \"CRYPTO\").slice(0, 600);\n    return other.concat(crypto, sports);\n  }\n\n  // authoritative category: Kalshi's own event category first, ticker regex as fallback\n  kalshiCat(evCat, ticker, title) {\n    const c = String(evCat || \"\").toLowerCase();\n    if (c.indexOf(\"sport\") >= 0) return \"SPORTS\";\n    if (c.indexOf(\"crypto\") >= 0) return \"CRYPTO\";\n    if (c.indexOf(\"econ\") >= 0 || c.indexOf(\"financ\") >= 0) return \"ECON\";\n    if (c.indexOf(\"climate\") >= 0 || c.indexOf(\"weather\") >= 0) return \"WEATHER\";\n    if (c.indexOf(\"politic\") >= 0 || c.indexOf(\"election\") >= 0) return \"POLITICS\";\n    return this.tickerCat((ticker || \"\") + \" \" + (title || \"\"));\n  }\n\n  // ===== SCANNER v2 — three parallel lanes, one authoritative pool =====\n  // LANE A · EVENTS: /events?with_nested_markets=true — Kalshi's own index. Every open\n  //   event (every game, every series) arrives WITH its markets and its OFFICIAL\n  //   category — sports coverage no longer depends on guessing ticker names.\n  // LANE B · WINDOW: /markets in the 18.5h close window — sweeps anything lane A missed.\n  // LANE C · SERIES: direct probes of fast crypto/index series (15m/hourly) + discovered\n  //   sports series — freshest quotes for the markets the desk trades most.\n  // Lanes run in PARALLEL, merge, dedupe (events win — they carry the category), then\n  // fill per-category quotas (600 SPORTS · 400 CRYPTO · 600 other — thousands watched).\n  // Between full sweeps (3 min) a fast lane re-quotes the most time-critical tickers\n  // every 45s. KALSHI ONLY — no other exchanges, ever.\n  async fetchLive() {\n    const KBASE = \"https://api.elections.kalshi.com/trade-api/v2\";\n    const nowS = Math.floor(Date.now() / 1000);\n    const winS = Math.max(72300, (this.horizonMins() + 125) * 60);\n    const W = \"&min_close_ts=\" + (nowS + 240) + \"&max_close_ts=\" + (nowS + winS);\n    const diag = [];\n    const t0 = Date.now();\n    // FAST FIRST PAINT: no usable pool yet → try the server feed (instant when its\n    // cache is warm), else ONE single-page window probe. Total: 1-2 requests — the\n    // browser must never race the server feed for Kalshi's rate budget.\n    if (!(this.livePool && this.livePool.filter(m => m.closeTs > Date.now() + 4 * 60000).length >= 3)) {\n      try {\n        const jf = await this.fetchJson(\"/api/feed\", 8000).catch(() => null);\n        if (jf && Array.isArray(jf.pool) && jf.pool.length >= 3) {\n          this.livePool = jf.pool.map(m => ({ t: m.t, ticker: m.ticker, c: m.c, src: \"KALSHI\", yes: m.yes, closeTs: m.closeTs, vol: m.vol, _bid: m.bid, _ask: m.ask }));\n          this.dataMode = \"live\"; this.liveSource = \"KALSHI\"; this.kalshiBase = \"/api/kalshi\"; this.feedFnOk = true;\n          diag.push(\"QUICK CONNECT via feed fn: \" + this.livePool.length + \" markets\");\n          this.pushEvent(\"\\u27f3\", \"#4fce7f\", \"quick connect \\u00b7 \" + this.livePool.length + \" markets (server feed)\", { kind: \"feed\", coalesce: true });\n          this.setState({ rev: this.state.rev + 1 });\n        } else {\n          for (const qb of [\"/api/kalshi\", KBASE]) {\n            const j = await this.fetchJson(qb + \"/markets?limit=1000&status=open\" + W, 8000).catch(() => null);\n            const pool = j ? this.mapKalshi({ markets: j.markets || [] }) : [];\n            if (pool.length >= 3) {\n              this.livePool = pool; this.dataMode = \"live\"; this.liveSource = \"KALSHI\"; this.kalshiBase = qb;\n              diag.push(\"QUICK CONNECT: \" + pool.length + \" markets \\u2014 full sweep upgrading in background\");\n              this.pushEvent(\"\\u27f3\", \"#4fce7f\", \"quick connect \\u00b7 \" + pool.length + \" markets \\u2014 full sweep running\", { kind: \"feed\", coalesce: true });\n              this.setState({ rev: this.state.rev + 1 });\n              break;\n            }\n          }\n        }\n      } catch (e) {}\n    }\n    const laneWindow = async (base, wrap) => {\n      let cursor = \"\", raw = [], pages = 0;\n      do {\n        const u0 = base + \"/markets?limit=1000&status=open\" + W + (cursor ? \"&cursor=\" + encodeURIComponent(cursor) : \"\");\n        const j = await this.fetchJson(wrap ? wrap(u0) : u0, wrap ? 18000 : 12000);\n        raw = raw.concat(j.markets || []);\n        cursor = j.cursor || \"\";\n        pages++;\n      } while (cursor && pages < 12 && raw.length < 8000 && Date.now() - t0 < 40000);\n      diag.push(\"WINDOW: \" + raw.length + \" markets/\" + pages + \"pg\");\n      return raw;\n    };\n    const laneSeries = async (base, wrap) => {\n      // static fast-mover list only — the window lane is the real source; this just\n      // freshens the highest-churn crypto/sports series without burning rate budget\n      const series = [\"KXBTC15M\", \"KXETH15M\", \"KXSOL15M\", \"KXXRP15M\", \"KXBTCD\", \"KXETHD\", \"KXINXD\", \"KXNASDAQ100D\", \"KXMLBGAME\", \"KXWNBAGAME\", \"KXNBAGAME\", \"KXNHLGAME\", \"KXUFCFIGHT\", \"KXWCTOTAL\", \"KXWCSPREAD\", \"KXWCADVANCE\"];\n      const raw = [], hits = [];\n      for (let i = 0; i < series.length; i += 4) {\n        if (Date.now() - t0 > 35000) break;\n        const rs = await Promise.all(series.slice(i, i + 4).map(s => {\n          const u0 = base + \"/markets?limit=100&status=open&series_ticker=\" + s;\n          return this.fetchJson(wrap ? wrap(u0) : u0, 12000).catch(() => null);\n        }));\n        rs.forEach((j, k) => { if (j && j.markets && j.markets.length) { raw.push.apply(raw, j.markets); hits.push(series[i + k]); } });\n        if (i + 4 < series.length) await new Promise(r => setTimeout(r, 500));\n      }\n      diag.push(\"SERIES: probe = wOf(b);\n      n += wt; w += (b.result === \"won\" ? wt : 0); exp += wt * expOf(b);\n      rn++; rw += b.result === \"won\" ? 1 : 0;\n    });\n    const shortfall = n > 0 ? Math.max(0, (exp - w) / n) : 0;\n    const calib = Math.round(Math.min(4, shortfall * 100 * (n / (n + 20))) * 10) / 10;\n    // per-category aggregates\n    const cat = {};\n    bets.forEach(b => {\n      const wt = wOf(b);\n      const c = cat[b.cat] = cat[b.cat] || { n: 0, w: 0, exp: 0, rn: 0, rw: 0 };\n      c.n += wt; c.w += (b.result === \"won\" ? wt : 0); c.exp += wt * expOf(b);\n      c.rn++; c.rw += b.result === \"won\" ? 1 : 0;\n    });\n    const bandOf = pc2 => pc2 >= 86 ? \"86\\u00a2+\" : pc2 >= 80 ? \"80\\u201385\\u00a2\" : pc2 >= 70 ? \"70\\u201379\\u00a2\" : \"<70\\u00a2\";\n    const bandStats = {};\n    bets.forEach(b => {\n      const wt = wOf(b);\n      const k = bandOf(b.pc);\n      const c = bandStats[k] = bandStats[k] || { n: 0, w: 0, exp: 0, rn: 0, rw: 0 };\n      c.n += wt; c.w += (b.result === \"won\" ? wt : 0); c.exp += wt * expOf(b);\n      c.rn++; c.rw += b.result === \"won\" ? 1 : 0;\n    });\n    const bandAdj = {};\n    Object.keys(bandStats).forEach(k => {\n      const c = bandStats[k];\n      const expRate = c.exp / c.n;\n      const adjRate = (c.w + 2 * expRate) / (c.n + 2);\n      const short = Math.max(0, expRate - adjRate);\n      bandAdj[k] = {\n        extra: Math.round(Math.min(4, short * 100 * (c.n / (c.n + 8))) * 10) / 10,\n        mult: Math.max(0.6, Math.min(1.25, adjRate / Math.max(expRate, 0.05))),\n        rec: c.rw + \"\\u2013\" + (c.rn - c.rw)\n      };\n    });\n    const catAdj = {};\n    Object.keys(cat).forEach(k => {\n      const c = cat[k];\n      const expRate = c.exp / c.n;\n      const adjRate = (c.w + 2 * expRate) / (c.n + 2); // Bayesian shrink toward expected\n      const short = Math.max(0, expRate - adjRate);\n      catAdj[k] = {\n        extra: Math.round(Math.min(5, short * 100 * (c.n / (c.n + 8))) * 10) / 10,\n        mult: Math.max(0.6, Math.min(1.25, adjRate / Math.max(expRate, 0.05))),\n        rec: c.rw + \"\\u2013\" + (c.rn - c.rw)\n      };\n    });\n    // loss-streak cooldowns\n    const byCat = {};\n    bets.slice().sort((a, b) => a.closeTs - b.closeTs).forEach(b => { (byCat[b.cat] = byCat[b.cat] || []).push(b); });\n    const blocked = {};\n    Object.keys(byCat).forEach(k => {\n      const arr = byCat[k];\n      let streak = 0, lastTs = 0;\n      for (let i = arr.length - 1; i >= 0; i--) {\n        if (arr[i].result === \"lost\") { streak++; lastTs = Math.max(lastTs, arr[i].closeTs); } else break;\n      }\n      if (streak >= 3 && now < lastTs + 2 * 3600000) blocked[k] = lastTs + 2 * 3600000;\n    });\n    const allS = bets.slice().sort((a, b) => a.closeTs - b.closeTs);\n    let gStreak = 0, gLast = 0;\n    for (let i = allS.length - 1; i >= 0; i--) {\n      if (allS[i].result === \"lost\") { gStreak++; gLast = Math.max(gLast, allS[i].closeTs); } else break;\n    }\n    const haltUntil = (gStreak >= 5 && now < gLast + 3600000) ? gLast + 3600000 : 0;\n    // PAYOFF-ASYMMETRY brake: one loss at 85¢ costs ~6 wins to recover; at 90¢, ~9.\n    // If the last 24h of settled bets (n≥6) win under 50%, entries ≥80¢ are OFF —\n    // the book is saying these favorites are NOT winning at favorite rates.\n    let n24 = 0, w24 = 0;\n    bets.forEach(b => { if ((b.closeTs || 0) > now - 86400000) { n24++; if (b.result === \"won\") w24++; } });\n    const hiCap = n24 >= 6 && (w24 / n24) < 0.5;\n    // human-readable summary\n    const remM = ts => Math.max(1, Math.ceil((ts - now) / 60000)) + \"m\";\n    const lines = [];\n    if (!rn) {\n      lines.push({ text: \"Collecting settled outcomes \\u2014 adjustments begin after the first results land.\", color: \"#7d8697\" });\n    } else {\n      const expDisp = (exp / (n / rn)).toFixed(1);\n      lines.push({ text: \"CALIBRATION: \" + rw + \"\\u2013\" + (rn - rw) + \" actual vs ~\" + expDisp + \" expected wins\" + (calib > 0 ? \" \\u2192 demanding +\" + calib + \"\\u00a2 extra edge on every entry\" : \" \\u2192 on target, no penalty\"), color: calib > 0 ? \"#eab54e\" : \"#4fce7f\" });\n      Object.keys(catAdj).sort((a, b) => catAdj[a].mult - catAdj[b].mult).slice(0, 4).forEach(k => {\n        const a = catAdj[k];\n        lines.push({ text: k + \": \" + a.rec + \" \\u00b7 form \\u00d7\" + a.mult.toFixed(2) + (a.extra > 0 ? \" \\u00b7 +\" + a.extra + \"\\u00a2 extra edge required\" : \"\"), color: a.mult >= 1 ? \"#4fce7f\" : \"#e8875a\" });\n      });\n      Object.keys(bandAdj).sort().forEach(k => {\n        const a = bandAdj[k];\n        lines.push({ text: \"BAND \" + k + \": \" + a.rec + \" \\u00b7 \\u00d7\" + a.mult.toFixed(2) + (a.extra > 0 ? \" \\u00b7 +\" + a.extra + \"\\u00a2 extra edge required\" : \"\"), color: a.mult >= 1 ? \"#4fce7f\" : \"#e8875a\" });\n      });\n      Object.keys(blocked).forEach(k => lines.push({ text: \"COOLDOWN: \" + k + \" blocked \" + remM(blocked[k]) + \" after 3 straight losses\", color: \"#e5636a\" }));\n      if (haltUntil) lines.push({ text: \"CIRCUIT BREAKER: all entries paused \" + remM(haltUntil) + \" after 5 straight losses\", color: \"#e5636a\" });\n      if (hiCap) lines.push({ text: \"ASYMMETRY BRAKE: \" + w24 + \"/\" + n24 + \" wins last 24h — entries ≥80¢ blocked (one 85¢ loss ≈ 6 wins to recover)\", color: \"#e5636a\" });\n    }\n    this._lm = { calib, catAdj, blocked, haltUntil, hiCap, lines,\n      reqEdge: (c, pc2) => Math.round((2.5 + calib + ((catAdj[c] && catAdj[c].extra) || 0) + ((pc2 != null && bandAdj[bandOf(pc2)] && bandAdj[bandOf(pc2)].extra) || 0)) * 10) / 10 };\n    this._lmTs = now;\n    return this._lm;\n  }\n\n  // ===== DOMAIN MODELS (researched) =====\n  // CRYPTO 15m/hourly binaries behave like 0DTE binary options:\n  //  - near expiry, 50-65c is the ATM zone: max gamma, coin-flip variance, max fee drag -> blocked\n  //  - ITM favorites earn time decay (pinning) IF the tape is stable; elevated 10-min\n  //    price range means premium stays uncertain until the final minutes -> extra edge required\n  //  - drift against the chosen side over the last 10 min is disqualifying; aligned drift helps\n  //  - time-vs-exposure: required edge scales with minutes held x instability\n  // WEATHER daily-high markets are diurnal and monotonic: the high only ratchets UP.\n  //  - \"stays under\" (NO) bets are blocked from morning until the afternoon peak has passed\n  //  - \"goes above\" (YES) bets before ~1pm local are forecast bets -> extra edge required\n  //  - after the peak the outcome is mostly locked; historically extreme-priced weather\n  //    markets settled true ~98% of the time and certainty tends to be under-priced ->\n  //    late-day favorites allowed up to 96c and given a small edge credit\n  domainLogic(m, side, pc, minsLeft, now) {\n    const tk = ((m.ticker || \"\") + \" \" + (m.t || \"\")).toUpperCase();\n    const hist = (this.pHist && this.pHist[m.ticker]) || [];\n    const past = hist.filter(h => h.ts <= now - 8 * 60000);\n    const old = past.length ? past[past.length - 1] : (hist[0] || null);\n    const range = hist.length >= 2 ? Math.max.apply(null, hist.map(h => h.yes)) - Math.min.apply(null, hist.map(h => h.yes)) : 0;\n    const drift = old ? m.yes - old.yes : 0;\n    const sideDrift = side === \"YES\" ? drift : -drift;\n    if (this.isCryptoTk(tk)) {\n      // ONE crypto loss = 90-min crypto stand-down: the tape that just beat the desk\n      // is the same tape behind every other strike (the 3-strike rule never tripped\n      // on Jul 5 because the losses were spaced hours apart)\n      const cLoss = ((this.log && this.log.bets) || []).filter(b => b.cat === \"CRYPTO\" && b.result === \"lost\").reduce((mx, b) => Math.max(mx, b.closeTs || 0), 0);\n      if (cLoss && now - cLoss < 90 * 60000) return { ok: false, extra: 0, label: \"crypto: 90m stand-down after any crypto loss\", val: Math.ceil((cLoss + 90 * 60000 - now) / 60000) + \"m left\" };\n      if (pc < 66 && minsLeft <= 20) return { ok: false, extra: 0, label: \"crypto: <66\\u00a2 near expiry = ATM coin-flip (max gamma + fee drag)\", val: pc + \"\\u00a2@\" + Math.round(minsLeft) + \"m\" };\n      // research: time held = variance absorbed; a favorite's edge decays with exposure.\n      // long holds only allowed deep ITM (>=90\\u00a2) where the cushion covers the tape\n      if (minsLeft > 240 && pc < 90) return { ok: false, extra: 0, label: \"crypto: >4h hold below 90\\u00a2 \\u2014 too much tape variance for the cushion\", val: pc + \"\\u00a2@\" + (minsLeft / 60).toFixed(1) + \"h\" };\n      if (sideDrift <= -5) return { ok: false, extra: 0, label: \"crypto: tape moving against this side over last 10m\", val: sideDrift + \"\\u00a2/10m\" };\n      // NEAR-STRIKE GAMMA ZONE: a favorite priced in the 70s-80s with under an hour\n      // left is priced there BECAUSE the strike is within ordinary tape reach — every\n      // Jul 5 crypto loss lived here. Only a >=90\\u00a2 cushion passes, or <90\\u00a2 with a\n      // dead-calm, aligned tape the desk has actually OBSERVED (\\u22643\\u00a2 range over 10m).\n      const tapeKnown = hist.length >= 3;\n      if (minsLeft <= 60 && pc < 90 && !(tapeKnown && range <= 3 && sideDrift >= 0)) {\n        return { ok: false, extra: 0, label: \"crypto: <90\\u00a2 near-strike gamma zone \\u2014 needs \\u226590\\u00a2 cushion or dead-calm aligned observed tape\", val: pc + \"\\u00a2 \\u00b7 \\u00b1\" + Math.round(range) + \"\\u00a2\" + (tapeKnown ? \"\" : \" \\u00b7 tape unobserved\") };\n      }\n      let extra = 0; const notes = [];\n      // overnight ET (2-7am): thin books + whipsaw regime — the Jul 5 losses (2:15am NO / 4:35am YES\n      // on the same BTC tape, both lost) happened here. Demand a real premium to trade it.\n      const etH2 = (new Date(now).getUTCHours() + 20) % 24;\n      if (etH2 >= 2 && etH2 < 7) { extra += 2.5; notes.push(\"overnight ET tape (2\\u20137am) \\u2014 thin books, whipsaw regime\"); }\n      if (range >= 10) { extra += 2.5; notes.push(\"elevated vol regime (\\u00b1\" + Math.round(range) + \"\\u00a2/10m) \\u2014 premium stays uncertain till the last minutes\"); }\n      else if (range >= 6) { extra += 1; notes.push(\"moderate vol (\\u00b1\" + Math.round(range) + \"\\u00a2/10m)\"); }\n      if (sideDrift >= 4) { extra -= 0.5; notes.push(\"tape momentum aligned (+\" + sideDrift + \"\\u00a2/10m)\"); }\n      extra += Math.min(2, (minsLeft / 60) * (range / 12)); // exposure-time tax in unstable regimes\n      return { ok: true, extra: Math.round(extra * 10) / 10, label: \"crypto 0DTE: ITM favorite + stable tape wins by time decay\", val: \"\\u00b1\" + Math.round(range) + \"\\u00a2 \" + (sideDrift >= 0 ? \"+\" : \"\") + sideDrift + \"\\u00a2\", note: notes.join(\"; \") };\n    }\n    if (/KXHIGH|KXLOW|KXTEMP|HIGH TEMP|LOW TEMP/.test(tk)) {\n      // WEATHER RE-ENABLED (v97) — post-peak lock-in lane ONLY. Why it failed before:\n      // the desk was making FORECAST bets (morning entries on a model temp). But daily\n      // temp extremes are monotonic — the high only ratchets UP, the low only ratchets\n      // DOWN — so after the diurnal turn the outcome is physics, not forecast, and\n      // extreme-priced weather markets have settled true ~98% of the time. Safeguards\n      // (reusing the crypto/sports framework):\n      //   1. SHORT WINDOW — market must close within 5h; no long forecast exposure\n      //   2. CLOCK GATE — highs only after 3pm local station time, lows after 9am\n      //   3. 85–96¢ favorites only (near-certainties; certainty is under-priced late)\n      //   4. OBSERVED-STABLE BOOK — 3+ samples, ≤5¢/10m range, no adverse drift\n      //   5. MAX 1 open weather position · 24h stand-down after any weather loss\n      const wBets = ((this.log && this.log.bets) || []).filter(b => b.cat === \"WEATHER\");\n      const wLoss = wBets.filter(b => b.result === \"lost\").reduce((mx, b) => Math.max(mx, b.closeTs || 0), 0);\n      if (wLoss && now - wLoss < 24 * 3600000) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: 24h stand-down after a weather loss\", val: Math.ceil((wLoss + 24 * 3600000 - now) / 3600000) + \"h left\" };\n      if (wBets.some(b => !b.result)) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: max 1 open weather position\", val: \"slot full\" };\n      // local station hour from the ticker's city code (July = DST offsets)\n      const cm = (m.ticker || \"\").toUpperCase().match(/KX(?:HIGH|LOW|TEMP)([A-Z]+)/);\n      const city = cm ? cm[1].replace(/-.*/, \"\") : \"\";\n      const off = /NY|PHIL|MIA|DC|BOS|ATL/.test(city) ? -4 : /CHI|AUS|HOU|MIN|DAL|NASH/.test(city) ? -5 : /DEN/.test(city) ? -6 : /LAX|SEA|SF|PHX|VEGAS|LV|PORT/.test(city) ? -7 : -4;\n      const locH = ((new Date(now).getUTCHours() + 24 + off) % 24) + new Date(now).getUTCMinutes() / 60;\n      const isLow = /KXLOW|LOW TEMP/.test(tk);\n      if (!isLow && locH < 15) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: daily high not locked until the ~3pm-local diurnal peak — morning entries are forecast bets (the old failure mode)\", val: city + \" \" + Math.floor(locH) + \":00 local\" };\n      if (isLow && locH < 9) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: daily low is set near sunrise — locked after ~9am local\", val: city + \" \" + Math.floor(locH) + \":00 local\" };\n      if (pc < 85) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: <85¢ — post-peak lane trades near-certainties only\", val: pc + \"¢\" };\n      if (minsLeft > 300) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: closes >5h out — shortened window, no long exposure\", val: (minsLeft / 60).toFixed(1) + \"h\" };\n      if (hist.length < 3) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: book not yet observed — need 3+ quote samples before entry\", val: \"tape unobserved\" };\n      if (range > 5) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: book unstable ±\" + Math.round(range) + \"¢/10m — a locked outcome does not reprice; movement means the extreme is still in play\", val: \"±\" + Math.round(range) + \"¢\" };\n      if (sideDrift <= -3) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: book drifting against this side — late repricing = new information (temperature still ticking)\", val: sideDrift + \"¢/10m\" };\n      let extra = 1; const notes = [\"base weather premium (NWS-station settlement basis risk)\"];\n      if (pc >= 90 && sideDrift >= 0) { extra -= 0.5; notes.push(\"post-peak certainty historically under-priced (~98% settle-true at extremes)\"); }\n      return { ok: true, extra: Math.round(extra * 10) / 10, bandMin: 85, bandMax: 96, label: \"weather post-peak: extreme locked, 85–96¢ favorite, stable observed book\", val: city + \" \" + Math.floor(locH) + \":00 · \" + pc + \"¢\", note: notes.join(\"; \") };\n    }\n    // SPORTS: single-event variance is brutal, so only the safest slice qualifies:\n    //  - 18h WATCHLIST, but entries only inside the final 6h (T-MINUS gate) once\n    //    lineups/injuries/weather are priced in; nothing inside the last 45 min\n    //  - 80-94c heavy favorites only (no toss-ups, no longshots-in-disguise)\n    //  - bid/ask spread must be under 4c \\u2014 wide spread = thin or uncertain book\n    //  - sharp odds movement (>= 12c/10m range) = someone knows something -> blocked\n    //  - live line moving against the side >= 4c/10m = momentum swing -> blocked\n    //  - +1.5c base extra edge, + up to +1.5c time-exposure tax (full at 6h),\n    //    + 1.5c if the line is drifting (range >= 8c/10m)\n    //  - $1,000 min 24h volume (real books only) enforced via volMin\n    if (m.c === \"SPORTS\") {\n      // research (favorite-longshot bias): favorites lose least, longshots and exotic\n      // props lose most — and low-information prop markets are where pricing is worst\n      // while fees/spreads eat any apparent edge. MAIN LINES ONLY: winner / spread / total.\n      if (/EXACT SCORE|CORRECT SCORE|GOALSCORER|TO SCORE|CORNERS|CARDS|PENALT|1ST HALF|FIRST HALF|HALFTIME|SHOTS ON|ASSISTS|REBOUNDS|STRIKEOUTS/i.test(tk)) {\n        return { ok: false, extra: 0, bandMin: 75, bandMax: 94, label: \"sports: exotic prop \\u2014 thin book, worst-priced pool; main lines only\", val: \"prop\" };\n      }\n      const spr = (m._ask != null && m._bid != null && m._ask > 0 && m._bid > 0) ? m._ask - m._bid : null;\n      if (pc < 75) return { ok: false, extra: 0, bandMin: 75, bandMax: 94, label: \"sports: <75\\u00a2 = single-event variance too high \\u2014 strong favorites only\", val: pc + \"\\u00a2\" };\n      if (spr != null && spr > 4) return { ok: false, extra: 0, bandMin: 75, bandMax: 94, label: \"sports: bid/ask spread over 4\\u00a2 \\u2014 thin or uncertain book\", val: spr + \"\\u00a2 spread\" };\n      if (range >= 12) return { ok: false, extra: 0, bandMin: 75, bandMax: 94, label: \"sports: sharp odds movement \\u2014 unexplained \\u00b1\" + Math.round(range) + \"\\u00a2/10m means someone knows something\", val: \"\\u00b1\" + Math.round(range) + \"\\u00a2/10m\" };\n      if (sideDrift <= -4) return { ok: false, extra: 0, bandMin: 75, bandMax: 94, label: \"sports: line moving against this side (live-game swing risk)\", val: sideDrift + \"\\u00a2/10m\" };\n      let extra = 1.5; const notes = [\"safety margin for single-event variance\"];\n      if (pc < 80) { extra += 1.5; notes.push(\"75\\u201379\\u00a2 sub-band \\u2014 extra premium demanded\"); }\n      if (sideDrift >= 3) { extra -= 0.5; notes.push(\"steam aligned \\u2014 line moving toward this side (sharp-money confirmation)\"); }\n      extra += Math.round(Math.min(1, minsLeft / 360) * 1.5 * 10) / 10; // exposure-time tax, full at 6h\n      if (range >= 8) { extra += 1.5; notes.push(\"line drifting (\\u00b1\" + Math.round(range) + \"\\u00a2/10m)\"); }\n      return { ok: true, extra: Math.round(extra * 10) / 10, bandMin: 75, bandMax: 94, volMin: 500, label: \"sports: 75\\u201394\\u00a2 favorite, tight spread, stable line, $500+ volume\", val: pc + \"\\u00a2 \" + (sideDrift >= 0 ? \"+\" : \"\") + sideDrift + \"\\u00a2/10m\" + (spr != null ? \" \\u00b7 \" + spr + \"\\u00a2 spr\" : \"\"), note: notes.join(\"; \") };\n    }\n    return { ok: true, extra: 0, label: \"no domain model for this market family\", val: \"n/a\" };\n  }\n\n  categoryPerf() {\n    const agg = {}, out = {};\n    const bets = (this.log && this.log.bets) || [];\n    bets.filter(b => b.result).forEach(b => {\n      const k = b.cat; agg[k] = agg[k] || { n: 0, act: 0, exp: 0 };\n      agg[k].n++; agg[k].act += b.result === \"won\" ? 1 : 0; agg[k].exp += Math.min(0.95, b.pc / 100 + 0.03);\n    });\n    Object.keys(agg).forEach(k => {\n      const a = agg[k];\n      out[k] = Math.max(0.85, Math.min(1.15, 1 + ((a.act - a.exp) / a.n) * 0.8));\n    });\n    return out;\n  }\n\n  // ===== THE THOUGHT PROCESS =====\n  // Every candidate position (both sides of every market) must clear 5 hard gates\n  // before a $25 bet is placed:\n  //   1. T-MINUS   — settles in 5-60 minutes (sub-1h desk, no overnight risk)\n  //   2. WIN ODDS  — price 55-90c: favorite band, avoids longshots and no-payout\n  //   3. MODEL EDGE — model signal >= +2.5c over market price\n  //   4. SCORE     — composite (55% win odds, 30% EV, 15% edge) x category form >= 60\n  //   5. EXPOSURE  — free slot, not already in this market, max 2 per category\n  //   6. LIVE BOOK — actual ask within drift cap of signal & nets ≥$1.25 at the ask\n  //   7. STRIKE BUFFER — threshold markets <1h out need ≥93¢ cushion or calm tape\n  evaluate(now) {\n    const M = this.markets();\n    const curHour = Math.floor(now / 3600000);\n    const bucket = Math.floor(now / 600000); // 10-min price/signal buckets\n    const nextTop = (curHour + 1) * 3600000;\n    const perf = this.categoryPerf();\n    const L = this.learnModel(now);\n    const op d || (100 - c.pc)));\n    const sideBid = c.side === \"YES\" ? (c.m._bid || (c.pc - 2)) : (100 - (c.m._ask || (100 - c.pc + 2)));\n    // maker price must NEVER cross the book: bid+1 EQUALS the ask when the spread is\n    // 1c, and Kalshi rejects a crossing post_only order as invalid. Cap at ask-1 —\n    // when the spread is already 1c this means joining the bid instead.\n    const makerPx = Math.min(sideBid + 1, Math.max(1, ask - 1));\n    // RETRY CROSSING (Jul 7 log): three cancel→retry cycles on one gas-price market,\n    // each retry \"taking the ask\" from a quote up to a sweep stale and resting\n    // unfilled another 1.5min. Retries now cross +1¢ per attempt; the slippage and\n    // worthless-at-ask guards below still bound the damage.\n    const price = Math.max(1, Math.min(99, Math.round((slow ? makerPx : ask) + (c.retryN || 0))));\n    const liveCount = Math.max(1, Math.floor(2500 / price)); // re-size so cost stays <= $25 at the actual limit price\n    // SLIPPAGE GUARD (Jul 6 post-mortem, the $62,700 loss): all 9 gates were\n    // checked at the SIGNAL quote (92¢) but the live ask was 4¢ — a stale feed\n    // turned a \"95% favorite\" into a 4¢ longshot and the desk bought it anyway.\n    // If the live book is >3¢ from the evaluated price, or below the win-odds\n    // band, the model no longer describes this bet: abort, void, cool off.\n    const maxDriftL = Math.max(1, Math.min(6, Math.round(this.props.liveBookMaxDrift != null ? this.props.liveBookMaxDrift : 3)));\n    if (Math.abs(price - c.pc) > maxDriftL || price < ((c.dl && c.dl.bandMin) || 70)) {\n      this.pushEvent(\"\\u26a0\", \"#e5636a\", \"SLIPPAGE ABORT \\u2014 gates passed at \" + c.pc + \"\\u00a2 but live book is \" + price + \"\\u00a2 \\u00b7 no order sent \\u00b7 \" + c.m.t);\n      (this.rejectCool = this.rejectCool || {})[c.m.ticker] = Date.now();\n      this.voidBet(betId, \"stale quote: signal \" + c.pc + \"\\u00a2 vs live book \" + price + \"\\u00a2\");\n      return;\n \n        try { localStorage.setItem(\"kpd-live-v1\", JSON.stringify(this.liveCfg)); } catch (e) {}\n        this.enginePost({ action: \"arm\", armed: true });\n        this.pushEvent(\"\\u25c9\", \"#e5636a\", \"LIVE TRADING ARMED \\u2014 full auto \\u00b7 $25 limit-at-ask \\u00b7 halt at \\u2212$500/day\");\n        this.lastBal = 0;\n        this.setState({ rev: this.state.rev + 1 });\n      },\n      stopLive: () => this.disarm(\"manual STOP\"),\n      copyLogLabel: this.state.logCopied ? \"\\u2713 COPIED\" : \"\\u29c9 COPY TEXT\",\n      copyLog: () => {\n        const p2 = n => String(n).padStart(2, \"0\");\n        const rows = (this.events || []).map(e => { const d = new Date(e.ts); return p2(d.getHours()) + \":\" + p2(d.getMinutes()) + \":\" + p2(d.getSeconds()) + \"  \" + e.icon + \"  \" + e.text + (e.n > 1 ? \" \\u00d7\" + e.n : \"\"); });\n        const txt = \"KALSHI DESK ACTIVITY LOG \\u00b7 \" + new Date().toLocaleString() + \" \\u00b7 \" + rows.length + \" events (24h retention)\\n\" + rows.join(\"\\n\");\n        const done = () => { this.setState({ logCopied: true }); setTimeout(() => this.setState({ logCopied: false }), 1600); };\n        const fb = () => { const ta = document.createElement(\"textarea\"); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand(\"copy\"); ta.remove(); done(); };\n        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done).catch(fb);\n        else fb();\n      },\n      buildTag: \"BUILD v99\",\n      events: (this.events || []).map(e => {\n        const d = new Date(e.ts);\n        const p2 = n => String(n).padStart(2, \"0\");\n        return { time: p2(d.getHours()) + \":\" + p2(d.getMinutes()) + \":\" + p2(d.getSeconds()), icon: e.icon, color: e.color, text: e.text + (e.n > 1 ? \" \\u00d7\" + e.n : \"\") };\n      }),\n      eventsEmpty: !(this.events && this.events.length),\n      feedDiag: (this.feedDiag || [\"feed check pending\\u2026\ s.state.editorText,\n      onEditorChange: (e) => this.setState({ editorText: e.target.value }),\n      saveEditor: () => {\n        const pool = this.parsePool(this.state.editorText);\n        if (pool.length < 3) { window.alert(\"Need at least 3 valid lines. Format per line:\\nMarket question | YES price in \\u00a2 | category | minutes to close\"); return; }\n        this.customPool = pool;\n        try { localStorage.setItem(this.POOL_KEY, JSON.stringify(pool)); } catch (e) {}\n        this.setState({ editorOpen: false });\n      },\n      clearCustom: () => {\n        this.customPool = null;\n        try { localStorage.removeItem(this.POOL_KEY); } catch (e) {}\n        this.setState({ editorOpen: false, editorText: \"\" });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
