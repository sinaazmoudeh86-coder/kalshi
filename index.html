  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

his._cur != null ? this._cur : parseNum(oldV);\n          if (to == null || from == null || from === to || oldV == null) {\n            this.textContent = newV; this._cur = to; return;\n          }\n          var m = String(newV).match(NUM_RE);\n          var pre = String(newV).slice(0, m.index);\n          var post = String(newV).slice(m.index + m[0].length);\n          var dec = (m[0].split(\".\")[1] || \"\").length;\n          var self = this, t0 = performance.now(), dur = 650;\n          cancelAnimationFrame(this._raf);\n          this.style.transition = \"none\";\n          this.style.textShadow = to > from ? \"0 0 16px rgba(79, 206, 127, 0.9)\" : \"0 0 16px rgba(229, 99, 106, 0.9)\";\n          function fmt(v) { return pre + v.toLocaleString(\"en-US\", { minimumFractionDigits: dec, maximumFractionDigits: dec }) + post; }\n          function step(tn) {\n            var p = Math.min(1, (tn - t0) / dur);\n            var e = 1 - Math.pow(1 - p, 3);\n            self.textContent = fmt(from + (to - from) * e);\n            if (p < 1) self._raf = requestAnimationFrame(step);\n            else {\n              self.textContent = newV;\n              self.style.transition = \"text-shadow 1.1s ease\";\n              self.style.textShadow = \"0 0 0 rgba(0, 0, 0, 0)\";\n            }\n          }\n          this._cur = to;\n          this._raf = requestAnimationFrame(step);\n        }\n      }\n      customElements.define(\"cu-num\", CuNum);\n    })();\n  <\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: radial-gradient(1100px 520px at 78% -12%, rgba(79, 206, 127, 0.06), transparent 60%), radial-gradient(900px 480px at 12% -10%, rgba(90, 167, 232, 0.055), transparent 60%), #0d0f13; color: #e6e9ef; font-family: Helvetica, Arial, sans-serif; padding: 0 0 40px 0;\">\n\n  <!-- Password gate -->\n  <sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"min-height: 100vh; display: flex; align-items: center; justify-con d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700; margin-bottom: 14px;\">STRATEGY PERFORMANCE<\u002Fdiv>\n        <sc-if value=\"{{ noStats }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">No settled bets yet.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <sc-for list=\"{{ stratStats }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #1a1f28; padding-bottom: 9px;\">\n              <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #e6e9ef;\">{{ s.name }}<\u002Fdiv>\n                <div style=\"font-size: 10px; color: #7d8697;\">{{ s.record }} · {{ s.rate }} hit<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: {{ s.pnlColor }};\">{{ s.pnl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Live trading -->\n      <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); padding: 16px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n          <div style=\"display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 11px; background: #3a465c; border-radius: 2px; display: inline-block;\"><\u002Fspan>LIVE TRADING<\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: {{ liveChipColor }}; background: {{ liveChipBg }}; border-radius: 3px; padding: 2px 8px;\">{{ liveChip }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: {{ engineColor }}; line-height: 1.5; margin-bottom: 10px;\">{{ engineLine }}<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;\">\n          <div style=\"background: #10141a; border: 1px solid #1d232e; border-radius: 4px; padding: 10px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697; margin-bottom: 4px;\">KALSHI BALANCE<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: #e6e9ef;\">{{ liveBalance }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #10141a; border: 1px solid #1d232e; border-radius: 4px; padding: 10px;\">\n            <div style=\"font-size: 9px; letter-spacing: 0.08em; color: #7d8697; margin-bottom: 4px;\">TODAY (LIVE BETS)<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: {{ livePnlTodayColor }};\">{{ livePnlTodayLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ liveDisarmed }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ armLive }}\" style=\"width: 100%; background: none; border: 1px solid #3a465c; border-radius: 4px; color: #e6e9ef; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; padding: 10px; cursor: pointer;\" style-hover=\"background: #1d2430;\">ARM LIVE TRADING<\u002Fbutton>\n          <div style=\"font-size: 10px; color: #5c6474; line-height: 1.5; margin-top: 8px;\">Requires the api/trade.js function deployed with KALSHI_AC .5; padding: 0 4px;\">{{ dataNote }} Settlement uses real Kalshi results when the feed provides them (✓ in the log), with odds-based simulation as fallback. Paper trading only — not financial advice.<\u002Fdiv>\n    <\u002Fdiv>\n\n      <!-- Bet log (full-width ledger) -->\n      <div style=\"flex: 1 1 100%; min-width: 0;\">\n        <div style=\"display: flex; align-items: stretch; gap: 8px; flex-wrap: wrap; margin: 0 0 12px 0;\">\n          <sc-for list=\"{{ pipeStages }}\" as=\"ps\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ ps.onClick }}\" style=\"flex: 1 1 190px; text-align: left; background: {{ ps.bg }}; border: 1px solid {{ ps.border }}; border-radius: 8px; padding: 10px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 3px;\" style-hover=\"border-color: #3a465c;\">\n              <div style=\"font-size: 9px; letter-spacing: 0.1em; color: {{ ps.labelColor }}; font-weight: 700;\">{{ ps.label }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: #e6e9ef;\">{{ ps.value }}<\u002Fdiv>\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #7d8697;\">{{ ps.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 10px 0;\">\n          <div style=\"display: flex; align-items: center; gap: 14px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px; font-size: 12px; letter-spacing: 0.12em; color: #aab2c0; font-weight: 700;\"><span style=\"width: 3px; height: 13px; background: #4fce7f; border-radius: 2px; display: inline-block;\"><\u002Fspan>LEDGER · THE BETTING PROCESS<\u002Fdiv>\n            <div style=\"display: flex; gap: 4px;\">\n              <sc-for list=\"{{ logTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ t.onClick }}\" style=\"background: {{ t.bg }}; border: 1px solid {{ t.border }}; border-radius: 3px; color: {{ t.color }}; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; padding: 3px 10px; cursor: pointer;\" style-hover=\"border-color: #3a465c;\">{{ t.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <div style=\"display: flex; align-items: center; gap: 3px;\" title=\"last 20 settled results, oldest → newest\">\n              <sc-for list=\"{{ streakDots }}\" as=\"sd\" hint-placeholder-count=\"8\">\n                <span style=\"width: 7px; height: 7px; border-radius: 2px; background: {{ sd.c }}; display: inline-block;\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">{{ logSummary }}<\u002Fdiv>\n            <button onclick=\"{{ resetLog }}\" style=\"background: none; border: 1px solid #2a303c; border-radius: 3px; color: #7d8697; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.08em; padding: 4px 10px; cursor: pointer;\" style-hover=\"border-color: #e5636a; color: #e5636a;\">RESET<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: linear-gradient(180deg, #151a22, #12161d); border: 1px solid #232936; border-radius: 8px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28); overflow-x: auto;\">\n          <div style=\"display: grid; grid-template-columns: 110px minmax(260px, 1.7fr) 124px 112px 64px 132px 92px; gap: 14px; padding: 9px 16px; border-bottom: 1px solid #232936; font-size: 9px; letter-spacing: 0.1em; color: #7d8697; font-weight: 700; min-width: 900px;\">\n            <div>TIME<\u002Fdiv><div>MARKET<\u002Fdiv><div>POSITION<\u002Fdiv><div>STRATEGY<\u002Fdiv><div style=\"text-align: right;\">STAKE<\u002Fdiv><div style=\"text-align: center;\">RESULT<\u002Fdiv><div style=\"text-align: right;\">P&amp;L<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"max-height: 430px; overflow-y: auto;\">\n            <sc-if value=\"{{ logEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding: 28px 16px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #7d8697;\">Nothing here yet — the scanner is hunting for qualifying entries.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ logRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div style=\"display: grid; grid-template-columns: 110px minmax(260px, 1.7fr) 124px 112px 64px 132px 92px; gap: 14px; padding: 10px 16px; border-bottom: 1px solid #1a1f28; font-size: 12.5px; align-items: center; min-width: 900px;\" style-hover=\"background: #171c25;\">\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7d8697;\">{{ r.time }}<\u002Fdiv>\n                <div style=\"color: #cfd4dd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\" title=\"{{ r.full }}\">{{ r.title }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: {{ r.sideColor }};\">{{ r.sideAt }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #8b93a3;\">{{ r.strat }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-align: right; color: #8b93a3;\">$40<\u002Fdiv>\n                <div style=\"display: flex; align-items: center; justify-content: center;\">\n                  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: {{ r.resultColor }}; background: {{ r.resultBg }}; border-radius: 3px; padding: 2px 8px;\">{{ r.result }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; text-align: right; color: {{ r.pnlColor }};\">{{ r.pnl }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 10px; color: #5c6474; margin-top: 8px; line-height: 1.5;\">Fully automated — the scanner places entries, settles them at market close, and updates P&amp;L, hit rate and bankroll on its own. No input needed.<\u002Fdiv>\n      <\u002Fdiv>\n\n\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startingBankroll&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 500, &quot;min&quot;: 100, &quot;max&quot;: 10000, &quot;unit&quot;: &quot;$&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Desk settings&quot;}}\">\nclass Component extends DCLogic {\n  state = { now: Date.now(), rev: 0, filter: \"all\", editorOpen: false, editorText: \"\", copiedId: null, pw: \"\", pwErr: false, auth: (() => { try { return localStorage.getItem(\"kpd-auth\") === \"ok\"; } catch (e) { return false; } })() };\n  KEY = \"kpd-live-log-v1\";\n  POOL_KEY = \"kpd-pool-v1\";\n  SNAPSHOT_LABEL = \"JUL 4, 2026\";\n\n  componentDidMount() {\n    this.loadLog();\n    // ?selftest=1 — run the external-data engine test suite and show the panel\n    try { if (/[?&]selftest=1/.test(window.location.search)) this.selftestRes = this.runSelfTests(); } catch (e) { this.selftestRes = [{ name: \"suite crashed\", pass: false, info: String(e) }]; }\n    // v107 LIVE-ONLY migration: void any OPEN paper positions left over from the\n    // paper builds — they'd otherwise count against exposure caps (1 crypto /\n    // 2 sports / same-underlying) and block real orders. Settled history stays.\n    const paperOpen = ((this.log && this.log.bets) || []).filter(b => !b.result && !b.live);\n    if (paperOpen.length) {\n      paperOpen.forEach(b => { b.result = \"void\"; b.settledBy = \"live-only migration\"; });\n      this.pushEvent(\"\\u25cb\", \"#7d8697\", \"LIVE-ONLY build: voided \" + paperOpen.length + \" open paper position\" + (paperOpen.length > 1 ? \"s\" : \"\") + \" \\u2014 real orders only from here\");\n      this.save();\n    }\n    document.addEventListener(\"visibilitychange\", () => {\n      if (!document.hidden && this.liveCfg && this.liveCfg.secret && Date.now() - (this.pfSynced || 0) > 10000) {\n        this.lastPf = Date.now(); this.lastBal = Date.now();\n        this.syncPortfolio(); this.fetchStatus();\n      }\n    });\n    try { this.liveCfg = JSON.parse(localStorage.getItem(\"kpd-live-v1\") || \"null\"); } catch (e) { this.liveCfg = null; }\n    this.dataMode = \"connecting\";\n    this.fetchLive();\n    this.tick();\n    this.timer = setInterval(() => this.tick(), 1000);\n  }\n  componentWillUnmount() { clearInterval(this.timer); clearTimeout(this.refetchT); clearTimeout(this.copyT); }\n\n  tick() {\n    const now = Date.now();\n    if (this.liveCfg && this.liveCfg.armed && !this._wl && !this._wlFail && navigator.wakeLock) {\n      this._wl = true;\n      navigator.wakeLock.request(\"screen\").then(l => { l.addEventListener(\"release\", () => { this._wl = false; }); }).catch(() => { this._wl = false; this._wlFail = true; });\n    }\n    if (this.liveCfg && this.liveCfg.secret && now - (this.lastEng || 0) > 20000) { this.lastEng = now; this.pollEngine(); }\n    if (this.liveCfg && this.liveCfg.secret && now - (this.lastBal || 0) > 15000) { this.lastBal = now; this.fetchStatus(); }\n    if (now - (this.lastSpot || 0) > 20000) { this.lastSpot = now; this.fetchSpot(); } // external spot/NWS sweep (v109) — runs in every mode\n    if (this.isServerMode()) { this.setState({ now }); return; } // server engine owns the trading loop\n    if (this.dataMode === \"live\" && now - (this.lastQHot || 0) > 15000) { this.lastQHot = now; this.fetchQuotes(true); }\n    if (this.dataMode === \"live\" && now - (this.lastQ || 0) > 60000) { this.lastQ = now; this.fetchQuotes(false); }\n    if (this.liveCfg && this.liveCfg.secret && now - (this.lastPf || 0) > 30000) { this.lastPf = now; this.syncPortfolio(); }\n    let dirty = this.settleDue(now);\n    dirty = this.scan(now) || dirty;\n    if (dirty) this.save();\n    this.setState({ now });\n  }\n\n  rng(seed) {\n    let t = seed >>> 0;\n    return () => {\n      t += 0x6D2B79F5;\n      let r = Math.imul(t ^ (t >>> 15), 1 | t);\n      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;\n      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;\n    };\n  }\n\n  tickerCat(t) {\n    t = (t || \"\").toUpperCase();\n    if (/BTC|ETH|SOL|XRP|DOGE|CRYPTO|BITCOIN|ETHEREUM/.test(t)) return \"CRYPTO\";\n    if (/FED|CPI|GDP|JOBS|CLAIMS|PAYROLL|RATE|INX|NASDAQ|S&P|TNOTE|RECESSION|INFLATION/.test(t)) return \"ECON\";\n    if (/OIL|GAS|GOLD|SILVER|WTI|BRENT|COMMOD/.test(t)) return \"COMMOD\";\n    if (/ELECTION|PRESIDENT|SENATE|GOVERNOR|CONGRESS|NOMINEE|PRIMARY|POLITIC|WHITE HOUSE|SUPREME COURT/.test(t)) return \"POLITICS\";\n    if (/HIGH|LOW|RAIN|SNOW|TEMP|STORM|HURR/.test(t)) return \"WEATHER\";\n    if (/SPORT|NBA|NFL|MLB|NHL|SOCCER|WC26|FIFWC|FIFA|UFC|TENNIS|GOLF|F1|MATCH|GAME|WORLD CUP|CHAMPION|EXACT SCORE|SPREAD:|O\\/U |OVER\\/UNDER|\\bVS\\.?\\b|1ST HALF|FIRST HALF|GOALSCORER|CORNERS|PREMIER LEAGUE|LA LIGA|SERIE A|BUNDESLIGA|GRAND PRIX|HOME RUN|TOUCHDOWN/.test(t)) return \"SPORTS\";\n    return \"MARKET\";\n  }\n\n  // ============================================================================\n  // EXTERNAL DATA ENGINE (v109) — live spot (Kraken/Coinbase), index quotes\n  // (Yahoo via api/spot.js), NWS station observations, and a macro-release\n  // calendar. Everything FAILS OPEN: no external data = the desk behaves exactly\n  // like v108. External data only ever adds checks, never replaces the tape.\n  // ============================================================================\n  SPOT_SYMS = [\"BTC\", \"ETH\", \"SOL\", \"XRP\", \"DOGE\"];\n  IDX_SYMS = [\"SPX\", \"NDX\"];\n  WX_STATIONS = { NY: \"KNYC\", NYC: \"KNYC\", CHI: \"KMDW\", MIA: \"KMIA\", AUS: \"KAUS\", DEN: \"KDEN\", LAX: \"KLAX\", PHIL: \"KPHL\", HOU: \"KHOU\", SEA: \"KSEA\", MIN: \"KMSP\", PHX: \"KPHX\", VEGAS: \"KLAS\", LV: \"KLAS\", BOS: \"KBOS\", ATL: \"KATL\", SF: \"KSFO\", PORT: \"KPDX\", NASH: \"KBNA\", DC: \"KDCA\", DAL: \"KDFW\" };\n  STATION_OFF = { KNYC: -4, KPHL: -4, KMIA: -4, KBOS: -4, KATL: -4, KDCA: -4, KMDW: -5, KAUS: -5, KHOU: -5, KMSP: -5, KDFW: -5, KBNA: -5, KDEN: -6, KPHX: -7, KLAS: -7, KLAX: -7, KSEA: -7, KSFO: -7, KPDX: -7 };\n\n  // observed-lock decision, factored out so the self-test can hit every branch.\n  // Returns { fail: {label, val} } | { credit, note } | null (no opinion).\n  wxLock(isLow, stw, wxe, side, stn) {\n    if (!wxe || wxe.n < 4 || wxe.age >= 2.5 * 3600000 || !stw || stw.kind === \"range\") return null;\n    const S = stw.a;\n    const ext = isLow ? wxe.lo : wxe.hi;\n    const crossed = isLow ? (wxe.lo <= S) : (wxe.hi >= S);\n    const crossedProp = isLow ? \"below\" : \"above\"; // the proposition a cross decides TRUE\n    const yesAsserts = stw.kind; // \"above\" | \"below\"\n    if (crossed) {\n      const lockedYes = yesAsserts === crossedProp;\n      if ((side === \"YES\") !== lockedYes) return { fail: { label: \"weather: NWS shows the outcome already printed AGAINST this side (extremes are monotonic \\u2014 it cannot un-cross)\", val: stn + \" obs \" + ext + \"\\u00b0 vs \" + S + \"\\u00b0\" } };\n      return { credit: 1, note: \"NWS-verified: observed \" + (isLow ? \"low \" : \"high \") + ext + \"\\u00b0 already past \" + S + \"\\u00b0 \\u2014 outcome printed\" };\n    }\n    const margin = isLow ? (wxe.lo - S) : (S - wxe.hi);\n    const safeYes = yesAsserts !== crossedProp; // side that wins if it never crosses\n    if (margin < 1.5) return { fail: { label: \"weather: NWS observed extreme within 1.5\\u00b0 of the strike \\u2014 one more reading decides it, coin-flip either way\", val: stn + \" \" + ext + \"\\u00b0 vs \" + S + \"\\u00b0\" } };\n    if ((side === \"YES\") !== safeYes) return { fail: { label: \"weather: this side needs the \" + (isLow ? \"low to fall\" : \"high to rise\") + \" another \" + margin.toFixed(1) + \"\\u00b0 after the diurnal turn \\u2014 betting against physics\", val: stn + \" \" + ext + \"\\u00b0, needs \" + S + \"\\u00b0\" } };\n    if (margin >= 3) return { credit: 0.5, note: \"NWS margin \" + margin.toFixed(1) + \"\\u00b0 with the extreme locked in\" };\n    return null;\n  }\n\n  // which spot symbol (if any) prices this market's settlement\n  spotSymFor(m) {\n    const tk = ((m.ticker || \"\") + \" \" + (m.t || \"\")).toUpperCase();\n    if (/KXBTC|BITCOIN|\\bBTC\\b/.test(tk)) return \"BTC\";\n    if (/KXETH|ETHEREUM|\\bETH\\b/.test(tk)) return \"ETH\";\n    if (/KXSOL|SOLANA|\\bSOL\\b/.test(tk)) return \"SOL\";\n    if (/KXXRP|\\bXRP\\b/.test(tk)) return \"XRP\";\n    if (/KXDOGE|DOGECOIN|\\bDOGE\\b/.test(tk)) return \"DOGE\";\n    if (/KXINX|S&P *500|\\bSPX\\b/.test(tk)) return \"SPX\";\n    if (/KXNASDAQ|NASDAQ/.test(tk)) return \"NDX\";\n    return null;\n  }\n\n  // parse the settlement strike out of a market title/ticker.\n  // Returns { kind: \"above\"|\"below\"|\"range\", a, b } or null.\n  parseStrike(title, ticker) {\n    const t = String(title || \"\");\n    const num = s => parseFloat(String(s).replace(/,/g, \"\"));\n    let m2;\n    // \"$64,300 or above\" / \"65° or above\" / \"$1,804.88 or higher\"\n    if ((m2 = t.match(/\\$?([\\d,]+(?:\\.\\d+)?)\\s*\\u00b0?\\s*or (above|higher|more)/i))) return { kind: \"above\", a: num(m2[1]) };\n    // \"$64,300 or below\" / \"63° or below\" / \"or lower/less\"\n    if ((m2 = t.match(/\\$?([\\d,]+(?:\\.\\d+)?)\\s*\\u00b0?\\s*or (below|lower|less)/i))) return { kind: \"below\", a: num(m2[1]) };\n    // \"Above 3.785\" / \"above $64,300\" / \"above 64.99°\"\n    if ((m2 = t.match(/above\\s+\\$?([\\d,]+(?:\\.\\d+)?)/i))) return { kind: \"above\", a: num(m2[1]) };\n    if ((m2 = t.match(/below\\s+\\$?([\\d,]+(?:\\.\\d+)?)/i))) return { kind: \"below\", a: num(m2[1]) };\n    // \"$70 to 70.99\" / \"70 to 70.99°\" / \"between 62 and 63\" — must carry $, ° or a\n    // decimal so date spans like \"Jul 6-7\" can never parse as a strike range\n    if ((m2 = t.match(/\\$?([\\d,]+(?:\\.\\d+)?)\\s*(?:to|-|\\u2013)\\s*\\$?([\\d,]+(?:\\.\\d+)?)\\s*\\u00b0?/i)) && !/\\d{4}/.test(m2[1]) && (/[$\\u00b0.]/.test(m2[0]))) return { kind: \"range\", a: num(m2[1]), b: num(m2[2]) };\n    if ((m2 = t.match(/between\\s+\\$?([\\d,]+(?:\\.\\d+)?)\\s+and\\s+\\$?([\\d,]+(?:\\.\\d+)?)/i))) return { kind: \"range\", a: num(m2[1]), b: num(m2[2]) };\n    // \"Target Price: $1,804.88\" (15-min up/down markets: YES = at-or-above target)\n    if ((m2 = t.match(/target price:?\\s*\\$?([\\d,]+(?:\\.\\d+)?)/i))) return { kind: \"above\", a: num(m2[1]) };\n    // ticker fallback: ...-T64299.99 (threshold = \"greater than\")\n    if ((m2 = String(ticker || \"\").match(/-T([\\d.]+)$/))) return { kind: \"above\", a: num(m2[1]) };\n    return null;\n  }\n\n  // realized 10-min volatility in $ from the spot sample ring\n  sig10m(sym) {\n    const sp = this.spot && this.spot[sym];\n    const h = sp && sp.hist;\n    if (!h || h.length < 6) return null;\n    const cut = Date.now() - 14 * 60000;\n    const w = h.filter(x => x.ts >= cut);\n    if (w.length < 6) return null;\n    let ss = 0, dt = 0;\n    for (let i = 1; i < w.length; i++) {\n      const d = w[i].p - w[i - 1].p, ms = Math.max(1000, w[i].ts - w[i - 1].ts);\n      ss += d * d; dt += ms;\n    }\n    if (!dt) return null;\n    return Math.sqrt((ss / dt) * 600000); // scale sample variance to a 10-min horizon\n  }\n\n  normCdf(z) { return 1 / (1 + Math.exp(-1.702 * z)); } // logistic approx, ±0.01 accurate\n\n  // spot-verified cushion: how far (in settle-horizon sigmas) is the live spot\n  // from the strike, in the direction this side needs?\n  cushionInfo(m, side, minsLeft) {\n    const sym = this.spotSymFor(m);\n    if (!sym) return null;\n    const sp = this.spot && this.spot[sym];\n    if (!sp || !(sp.p > 0)) return null;\n    const age = Date.now() - sp.ts;\n    if (age > 150000) return { sym, stale: true, age };\n    const st = this.parseStrike(m.t, m.ticker);\n    if (!st) return null;\n    let cushion;\n    if (st.kind === \"range\") {\n      const lo = Math.min(st.a, st.b), hi = Math.max(st.a, st.b);\n      const inside = Math.min(sp.p - lo, hi - sp.p);\n      cushion = side === \"YES\" ? inside : -inside; // YES = settles inside the range\n    } else {\n      const d = st.kind === \"above\" ? sp.p - st.a : st.a - sp.p;\n      cushion = side === \"YES\" ? d : -d;\n    }\n    const sig = this.sig10m(sym);\n    if (sig == null || !(sig > 0)) return { sym, spot: sp.p, strike: st, cushion, noSig: true, age };\n    const sigT = sig * Math.sqrt(Math.max(minsLeft, 2) / 10);\n    const z = cushion / sigT;\n    return { sym, spot: sp.p, strike: st, cushion, sig, sigT, z, prob: this.normCdf(z), age };\n  }\n\n  // CUSHION LEARNING — the desk's own settled record per z-band. If a band's\n  // favorites aren't winning at favorite rates, the z floor rises above it.\n  cushionLearn() {\n    const rec = { \"1-1.5\\u03c3\": { n: 0, w: 0 }, \"1.5-2.5\\u03c3\": { n: 0, w: 0 }, \"2.5\\u03c3+\": { n: 0, w: 0 } };\n    ((this.log && this.log.bets) || []).forEach(b => {\n      if (b.zEntry == null || (b.result !== \"won\" && b.result !== \"lost\")) return;\n      const k = b.zEntry < 1.5 ? \"1-1.5\\u03c3\" : b.zEntry < 2.5 ? \"1.5-2.5\\u03c3\" : \"2.5\\u03c3+\";\n      rec[k].n++; if (b.result === \"won\") rec[k].w++;\n    });\n    let minZ = 1.0;\n    if (rec[\"1-1.5\\u03c3\"].n >= 6 && rec[\"1-1.5\\u03c3\"].w / rec[\"1-1.5\\u03c3\"].n < 0.8) minZ = 1.5;\n    if (minZ === 1.5 && rec[\"1.5-2.5\\u03c3\"].n >= 6 && rec[\"1.5-2.5\\u03c3\"].w / rec[\"1.5-2.5\\u03c3\"].n < 0.8) minZ = 2.5;\n    return { rec, minZ };\n  }\n\n  // observed extremes since local midnight from NWS observations\n  wxExtremes(station, offH) {\n    const w = this.wx && this.wx[station];\n    if (!w || !w.obs || !w.obs.length) return null;\n    const now = Date.now();\n    const dayOf = ts => Math.floor((ts + offH * 3600000) / 86400000);\n    const today = dayOf(now);\n    const t = w.obs.filter(o => dayOf(o.ts) === today);\n    if (!t.length) return null;\n    let hi = -999, lo = 999, lastTs = 0, lastF = null;\n    t.forEach(o => { if (o.f > hi) hi = o.f; if (o.f < lo) lo = o.f; if (o.ts > lastTs) { lastTs = o.ts; lastF = o.f; } });\n    return { hi, lo, lastTs, lastF, n: t.length, age: now - lastTs };\n  }\n\n  // macro-release calendar: FOMC decisions (Fed schedule), CPI 8:30am ET (BLS;\n  // Sep-Dec estimated ±2 days, blackout is cheap so estimates are fine), and\n  // jobs report = first Friday 8:30am ET (computed).\n  macroReleases(now) {\n    if (this._macroCache && Math.abs(now - this._macroCache.ts) < 3600000) return this._macroCache.list;\n    const list = [\n      { name: \"FOMC\", ts: Date.parse(\"2026-07-29T18:00:00Z\") },\n      { name: \"FOMC\", ts: Date.parse(\"2026-09-16T18:00:00Z\") },\n      { name: \"FOMC\", ts: Date.parse(\"2026-10-28T18:00:00Z\") },\n      { name: \"FOMC\", ts: Date.parse(\"2026-12-09T19:00:00Z\") },\n      { name: \"CPI\", ts: Date.parse(\"2026-07-14T12:30:00Z\") },\n      { name: \"CPI\", ts: Date.parse(\"2026-08-12T12:30:00Z\") },\n      { name: \"CPI\", ts: Date.parse(\"2026-09-10T12:30:00Z\"), est: true },\n      { name: \"CPI\", ts: Date.parse(\"2026-10-13T12:30:00Z\"), est: true },\n      { name: \"CPI\", ts: Date.parse(\"2026-11-10T13:30:00Z\"), est: true },\n      { name: \"CPI\", ts: Date.parse(\"2026-12-10T13:30:00Z\"), est: true }\n    ];\n    // jobs report: first Friday of each of the next 6 months, 8:30 ET\n    const d0 = new Date(now);\n    for (let k = 0; k < 6; k++) {\n      const d = new Date(Date.UTC(d0.getUTCFullYear(), d0.getUTCMonth() + k, 1));\n      while (d.getUTCDay() !== 5) d.setUTCDate(d.getUTCDate() + 1);\n      const edt = d.getUTCMonth() >= 2 && d.getUTCMonth() <= 9; // DST Mar-Oct (close enough at month scale)\n      list.push({ name: \"JOBS\", ts: d.getTime() + (edt ? 12.5 : 13.5) * 3600000 });\n    }\n    list.sort((a, b) => a.ts - b.ts);\n    this._macroCache = { ts: now, list };\n    return list;\n  }\n\n  // a release \"blacks out\" an entry if the print lands while the position is on\n  // (entry-15m through close+5m). Applies to rate-sensitive families only.\n  nextBlackout(now, closeTs) {\n    const rs = this.macroReleases(now);\n    for (let i = 0; i < rs.length; i++) {\n      if (rs[i].ts >= now - 15 * 60000 && rs[i].ts <= closeTs + 5 * 60000) return rs[i];\n      if (rs[i].ts > closeTs + 5 * 60000) break;\n    }\n    return null;\n  }\n\n  // ---- spot polling: serverless fn first (one request), browser-direct fallback ----\n  wantedStations() {\n    const out = {};\n    (this.livePool || []).forEach(m => {\n      if (!/KXHIGH|KXLOW|KXTEMP/i.test(m.ticker || \"\")) return;\n      const cm = (m.ticker || \"\").toUpperCase().match(/KX(?:HIGH|LOW|TEMP)([A-Z]+)/);\n      const city = cm ? cm[1].replace(/-.*/, \"\") : \"\";\n      const st = this.WX_STATIONS[city];\n      if (st) out[st] = 1;\n    });\n    return Object.keys(out).slice(0, 6);\n  }\n\n  ingestSpot(sym, p, src) {\n    if (!(p > 0)) return;\n    this.spot = this.spot || {};\n    const s = this.spot[sym] = this.spot[sym] || { hist: [] };\n    s.p = p; s.ts = Date.now(); s.src = src;\n    const last = s.hist[s.hist.length - 1];\n    if (!last || s.ts - last.ts > 10000) { s.hist.push({ ts: s.ts, p }); if (s.hist.length > 80) s.hist.splice(0, s.hist.length - 80); }\n  }\n\n  async fetchSpot() {\n    const stations = this.wantedStations();\n    let got = false;\n    if (this.spotFnOk !== false) {\n      const j = await this.fetchJson(\"/api/spot\" + (stations.length ? \"?wx=\" + stations.join(\",\") : \"\"), 9000).catch(() => null);\n      if (j && j.srv) {\n        this.spotFnOk = true; got = true;\n        Object.keys(j.crypto || {}).forEach(k => this.ingestSpot(k, j.crypto[k].p, j.crypto[k].src));\n        Object.keys(j.idx || {}).forEach(k => this.ingestSpot(k, j.idx[k].p, j.idx[k].src));\n        this.wx = this.wx || {};\n        Object.keys(j.wx || {}).forEach(k => { this.wx[k] = { obs: j.wx[k].obs, ts: Date.now() }; });\n        this.spotDiag = (j.diag || []).join(\" \\u00b7 \");\n      } else if (this.spotFnOk === undefined) this.spotFnOk = false;\n    }\n    if (!got) {\n      // browser-direct fallback (local preview / spot fn not deployed):\n      // Kraken + Coinbase + NWS all send CORS headers; index quotes unavailable.\n      try {\n        const pairs = { BTC: \"XXBTZUSD\", ETH: \"XETHZUSD\", SOL: \"SOLUSD\", XRP: \"XXRPZUSD\", DOGE: \"XDGUSD\" };\n        const j = await this.fetchJson(\"https://api.kraken.com/0/public/Ticker?pair=\" + Object.values(pairs).join(\",\"), 6000).catch(() => null);\n        if (j && j.result) {\n          Object.keys(pairs).forEach(sym => { const row = j.result[pairs[sym]]; const p = row && row.c && parseFloat(row.c[0]); this.ingestSpot(sym, p, \"KRAKEN\"); });\n          got = true;\n        }\n        const missing = this.SPOT_SYMS.filter(s => !(this.spot && this.spot[s] && Date.now() - this.spot[s].ts < 60000));\n        if (missing.length) {\n          const rs = await Promise.all(missing.slice(0, 5).map(sym => this.fetchJson(\"https://api.coinbase.com/v2/prices/\" + sym + \"-USD/spot\", 5000).catch(() => null)));\n          rs.forEach((r, i) => { const p = r && r.data && parseFloat(r.data.amount); if (p > 0) { this.ingestSpot(missing[i], p, \"COINBASE\"); got = true; } });\n        }\n        this.wx = this.wx || {};\n        const needWx = stations.filter(st => !this.wx[st] || Date.now() - this.wx[st].ts > 10 * 60000).slice(0, 3);\n        const wrs = await Promise.all(needWx.map(st => this.fetchJson(\"https://api.weather.gov/stations/\" + st + \"/observations?limit=60\", 7000).catch(() => null)));\n        wrs.forEach((r, i) => {\n          if (!r || !r.features) return;\n          const obs = r.features.map(f => { const pr = f.properties || {}; const c = pr.temperature && pr.temperature.value; if (c == null) return null; return { ts: new Date(pr.timestamp).getTime(), f: Math.round((c * 9 / 5 + 32) * 10) / 10 }; }).filter(Boolean).sort((a, b) => a.ts - b.ts);\n          if (obs.length) { this.wx[needWx[i]] = { obs: obs.slice(-48), ts: Date.now() }; got = true; }\n        });\n        this.spotDiag = \"browser-direct (spot fn \" + (this.spotFnOk === false ? \"not deployed\" : \"unreachable\") + \")\";\n      } catch (e) { this.spotDiag = \"spot fetch: \" + String(e); }\n    }\n    if (got) this.spotTs = Date.now();\n    this.setState({ rev: this.state.rev + 1 });\n  }\n\n  // ---- self-test suite (?selftest=1): every external-data code path on synthetic data ----\n  runSelfTests() {\n    const T = [];\n    const eq = (name, got, want) => T.push({ name, pass: got === want, info: \"got \" + JSON.stringify(got) + (got === want ? \"\" : \" \\u00b7 want \" + JSON.stringify(want)) });\n    const near = (name, got, want, tol) => T.push({ name, pass: got != null && Math.abs(got - want) <= tol, info: \"got \" + (got == null ? \"null\" : (Math.round(got * 1000) / 1000)) + \" \\u00b7 want ~\" + want });\n    const ok = (name, cond, info) => T.push({ name, pass: !!cond, info: info || \"\" });\n    // strike parsing\n    let s = this.parseStrike(\"Bitcoin price on Jul 6, 2026? \\u2014 $64,300 or above\", \"\");\n    ok(\"parse: '$64,300 or above'\", s && s.kind === \"above\" && s.a === 64300, JSON.stringify(s));\n    s = this.parseStrike(\"HYPE price on Jul 6, 2026? \\u2014 $70 to 70.99\", \"\");\n    ok(\"parse: '$70 to 70.99' range\", s && s.kind === \"range\" && s.a === 70 && s.b === 70.99, JSON.stringify(s));\n    s = this.parseStrike(\"ETH price up in next 15 mins? \\u2014 Target Price: $1,804.88\", \"\");\n    ok(\"parse: 'Target Price: $1,804.88'\", s && s.kind === \"above\" && s.a === 1804.88, JSON.stringify(s));\n    s = this.parseStrike(\"Will the temp in NYC be above 64.99\\u00b0 on Jul 6? \\u2014 65\\u00b0 or above\", \"\");\n    ok(\"parse: '65\\u00b0 or above'\", s && s.kind === \"above\" && s.a === 65, JSON.stringify(s));\n    s = this.parseStrike(\"High temp in Miami \\u2014 63\\u00b0 or below\", \"\");\n    ok(\"parse: '63\\u00b0 or below'\", s && s.kind === \"below\" && s.a === 63, JSON.stringify(s));\n    s = this.parseStrike(\"Will average gas prices be above $3.785? \\u2014 Above 3.785\", \"\");\n    ok(\"parse: 'Above 3.785'\", s && s.kind === \"above\" && s.a === 3.785, JSON.stringify(s));\n    s = this.parseStrike(\"no strike here at all\", \"KXBTCD-26JUL06-T64299.99\");\n    ok(\"parse: ticker -T64299.99 fallback\", s && s.kind === \"above\" && s.a === 64299.99, JSON.stringify(s));\n    s = this.parseStrike(\"Bitcoin price at 3pm on Jul 6-7\", \"\");\n    eq(\"parse: date span 'Jul 6-7' is NOT a strike\", s, null);\n    eq(\"parse: garbage returns null\", this.parseStrike(\"Will X happen?\", \"KXFOO-BAR\"), null);\n    // normal CDF\n    near(\"normCdf(0) = 0.5\", this.normCdf(0), 0.5, 0.001);\n    near(\"normCdf(2) \\u2248 0.977\", this.normCdf(2), 0.977, 0.015);\n    near(\"normCdf(-1) \\u2248 0.159\", this.normCdf(-1), 0.159, 0.015);\n    // sigma estimator on a synthetic $10-per-10min random walk\n    this.spot = this.spot || {};\n    const hist = []; let p = 64000; const t0 = Date.now() - 13 * 60000;\n    for (let i = 0; i < 40; i++) { p += (i % 2 === 0 ? 1 : -1) * 2.5; hist.push({ ts: t0 + i * 20000, p }); }\n    this.spot.TEST = { p, ts: Date.now(), src: \"TEST\", hist };\n    const sg = this.sig10m(\"TEST\");\n    ok(\"sig10m: synthetic walk \\u2192 finite \\u03c3 > 0\", sg != null && sg > 3 && sg < 40, \"\\u03c3 = $\" + (sg && sg.toFixed(2)));\n    // cushion math (spot 64000, strike 63000 above-market)\n    this.spot.BTC = { p: 64000, ts: Date.now(), src: \"TEST\", hist };\n    let cu = this.cushionInfo({ t: \"Bitcoin \\u2014 $63,000 or above\", ticker: \"KXBTCD-X\" }, \"YES\", 30);\n    ok(\"cushion: YES above, spot $1k over strike \\u2192 z > 0\", cu && cu.z > 0 && Math.abs(cu.cushion - 1000) < 1, cu && (\"z=\" + cu.z.toFixed(1) + \" cushion=$\" + Math.round(cu.cushion)));\n    cu = this.cushionInfo({ t: \"Bitcoin \\u2014 $63,000 or above\", ticker: \"KXBTCD-X\" }, \"NO\", 30);\n    ok(\"cushion: NO side of same market \\u2192 z < 0\", cu && cu.z < 0, cu && (\"z=\" + cu.z.toFixed(1)));\n    cu = this.cushionInfo({ t: \"Bitcoin \\u2014 $63,900 to 64,100\", ticker: \"KXBTCD-X\" }, \"YES\", 30);\n    ok(\"cushion: range, spot inside \\u2192 YES cushion = dist to nearest bound\", cu && Math.abs(cu.cushion - 100) < 1, cu && (\"cushion=$\" + Math.round(cu.cushion)));\n    cu = this.cushionInfo({ t: \"Ethereum \\u2014 $1,800 or above\", ticker: \"KXETH-X\" }, \"YES\", 30);\n    ok(\"cushion: no ETH spot loaded \\u2192 null (fail-open)\", cu === null || (cu && cu.noSig), JSON.stringify(cu && { noSig: cu.noSig }));\n    const stale = this.spot.BTC.ts; this.spot.BTC.ts = Date.now() - 300000;\n    cu = this.cushionInfo({ t: \"Bitcoin \\u2014 $63,000 or above\", ticker: \"KXBTCD-X\" }, \"YES\", 30);\n    ok(\"cushion: stale spot \\u2192 flagged stale (fail-open)\", cu && cu.stale === true, JSON.stringify(cu && { stale: cu.stale }));\n    this.spot.BTC.ts = stale;\n    // weather extremes on synthetic obs (NY offset -4)\n    const now = Date.now();\n    const localMidnightUTC = now - ((now - 4 * 3600000) % 86400000) + 4 * 3600000 - 86400000 * 0; // approx: use obs clearly \"today local\"\n    this.wx = this.wx || {};\n    this.wx.KTEST = { obs: [ { ts: now - 90 * 60000, f: 66 }, { ts: now - 60 * 60000, f: 84.2 }, { ts: now - 30 * 60000, f: 79 } ], ts: now };\n    const ex = this.wxExtremes(\"KTEST\", -4);\n    ok(\"wxExtremes: hi/lo from obs\", ex && ex.hi === 84.2 && ex.lo <= 79, ex && (\"hi=\" + ex.hi + \" lo=\" + ex.lo + \" n=\" + ex.n));\n    // blackout calendar\n    const cpi = Date.par   lk = this.wxLock(false, { kind: \"above\", a: 88 }, wxeT, \"YES\", \"KNYC\");\n    ok(\"wxLock: betting on a +3.8\\u00b0 late cross \\u2192 blocked\", lk && lk.fail && /physics/.test(lk.fail.label), lk && lk.fail ? lk.fail.val : JSON.stringify(lk));\n    lk = this.wxLock(false, { kind: \"above\", a: 88 }, wxeT, \"NO\", \"KNYC\");\n    ok(\"wxLock: safe side with 3.8\\u00b0 margin \\u2192 credited\", lk && lk.credit === 0.5, JSON.stringify(lk));\n    lk = this.wxLock(true, { kind: \"below\", a: 67 }, wxeT, \"YES\", \"KNYC\");\n    ok(\"wxLock: low 66\\u00b0 printed \\u2264 67\\u00b0 strike \\u2192 YES-below credited\", lk && lk.credit === 1, JSON.stringify(lk));\n    lk = this.wxLock(false, { kind: \"above\", a: 82 }, { hi: 84, lo: 66, n: 2, age: 60000 }, \"NO\", \"KNYC\");\n    ok(\"wxLock: too few obs \\u2192 no opinion (fail-open)\", lk === null, JSON.stringify(lk));\n    // END-TO-END: synthetic market through the full 11-gate scanner\n    const sv = { pool: this.livePool, hist: this.pHist, quotes: this.quotes, log: this.log, spot: this.spot ? this.spot.BTC : null };\n    this.spot.BTC = { p: 64000, ts: Date.now(), src: \"TEST\", hist };\n    this.log = { bets: [] };\n    this.livePool = [{ t: \"Bitcoin price today? \\u2014 $63,000 or above\", ticker: \"KXBTCD-E2E\", c: \"CRYPTO\", src: \"KALSHI\", yes: 92, closeTs: now + 40 * 60000, vol: 5000, _bid: 91, _ask: 92 }];\n    this.pHist = { \"KXBTCD-E2E\": [{ ts: now - 9 * 60000, yes: 92 }, { ts: now - 5 * 60000, yes: 92 }, { ts: now - 60000, yes: 92 }] };\n    try {\n      const cands = this.evaluate(now);\n      const cy = cands.find(c2 => c2.side === \"YES\" && c2.m.ticker === \"KXBTCD-E2E\");\n      const cn = cands.find(c2 => c2.side === \"NO\" && c2.m.ticker === \"KXBTCD-E2E\");\n      const gy = cy && cy.gates.find(g => g.k === \"CUSHION\");\n      const gn = cn && cn.gates.find(g => g.k === \"CUSHION\");\n      const gb = cy && cy.gates.find(g => g.k === \"BLACKOUT\");\n      ok(\"e2e: scanner emits 11 gate ce, m.last_price_dollars);\n        const yes = last > 0 ? last : Math.round((bid + ask) / 2);\n        const closeTs = new Date(m.close_time).getTime();\n        const vol = num(m.volume_24h) || num(m.volume_24h_fp) || num(m.volume) || num(m.volume_fp) || num(m.liquidity_dollars);\n        return {\n          t: (m.title || m.ticker) + (m.yes_sub_title && m.yes_sub_title.length < 60 ? \" \\u2014 \" + m.yes_sub_title : \"\"),\n          ticker: m.ticker || \"\",\n          c: m._evcat || this.tickerCat(m.ticker + \" \" + (m.title || \"\")),\n          src: \"KALSHI\",\n          yes, closeTs, vol, _bid: bid, _ask: ask\n        };\n      })\n      .filter(m => m.yes >= 5 && m.yes <= (m.c === \"WEATHER\" ? 96 : 95) && m.closeTs - nowT > 4 * 60000 && m.closeTs - nowT < ((m.c === \"SPORTS\" ? 1080 : m.c === \"WEATHER\" ? 300 : this.horizonMins()) + 125) * 60000);\n    // primary: real traded volume OR a real two-sided book (fresh fast markets start\n    // at ~$0 volume but carry tight live quotes); last resort: any quoted market\n    let pool = mapped.filter(m => m.vol > 50 || (m._bid >= 3 && m._ask <= 97 && m._ask - m._bid <= 10));\n    if (pool.length < 3) pool = mapped.filter(m => m._bid > 0 && m._ask < 100);\n    // per-category quotas sized for full-universe watching — thousands of markets,\n    // no category able to crowd out another\n    const sorted = pool.sort((a, b) => b.vol - a.vol);\n    const sports = sorted.filter(m => m.c === \"SPORTS\").slice(0, 600);\n    const crypto = sorted.filter(m => m.c === \"CRYPTO\").slice(0, 400);\n    const other = sorted.filter(m => m.c !== \"SPORTS\" && m.c !== \"CRYPTO\").slice(0, 600);\n    return other.concat(crypto, sports);\n  }\n\n  // authoritative category: Kalshi's own event category first, ticker regex as fallback\n  kalshiCat(evCat, ticker, title) {\n    const c = String(evCat || \"\").toLowerCase();\n    if (c.indexOf(\"sport\") >= 0) return \"SPORTS\";\n    if (c.indexOf(\"crypto\") >= 0) return \"CRYPTO\";\n    if (c.indexOf(\"econ\") >= 0 || c.indexOf(\"financ\") >= 0) return \"ECON\";\n    if (c.indexOf(\"climate\") >= 0 || c.indexOf(\"weather\") >= 0) return \"WEATHER\";\n    if (c.indexOf(\"politic\") >= 0 || c.indexOf(\"election\") >= 0) return \"POLITICS\";\n    return this.tickerCat((ticker || \"\") + \" \" + (title || \"\"));\n  }\n\n  // ===== SCANNER v2 — three parallel lanes, one authoritative pool =====\n  // LANE A · EVENTS: /events?with_nested_markets=true — Kalshi's own index. Every open\n  //   event (every game, every series) arrives WITH its markets and its OFFICIAL\n  //   category — sports coverage no longer depends on guessing ticker names.\n  // LANE B · WINDOW: /markets in the 18.5h close window — sweeps anything lane A missed.\n  // LANE C · SERIES: direct probes of fast crypto/index series (15m/hourly) + discovered\n  //   sports series — freshest quotes for the markets the desk trades most.\n  // Lanes run in PARALLEL, merge, dedupe (events win — they carry the category), then\n  // fill per-category quotas (600 SPORTS · 400 CRYPTO · 600 other — thousands watched).\n  // Between full sweeps (3 min) a fast lane re-quotes the most time-critical tickers\n  // every 45s. KALSHI ONLY — no other exchanges, ever.\n  async fetchLive() {\n    const KBASE = \"https://api.elections.kalshi.com/trade-api/v2\";\n    const nowS = Math.floor(Date.now() / 1000);\n    const winS = Math.max(72300, (this.horizonMins() + 125) * 60);\n    const W = \"&min_close_ts=\" + (nowS + 240) + \"&max_close_ts=\" + (nowS + winS);\n    const diag = [];\n    const t0 = Date.now();\n    // FAST FIRST PAINT: no usable pool yet → try the server feed (instant when its\n    // cache is warm), else ONE single-page window probe. Total: 1-2 requests — the\n    // browser must never race the server feed for Kalshi's rate budget.\n    if (!(this.livePool && this.livePool.filter(m => m.closeTs > Date.now() + 4 * 60000).length >= 3)) {\n      try {\n        const jf = await this.fetchJson(\"/api/feed\", 8000).catch(() => null);\n        if (jf && Array.isArray(jf.pool) && jf.pool.length >= 3) {\n          this.livePool = jf.pool.map(m => ({ t: m.t, ticker: m.ticker, c: m.c, src: \"KALSHI\", yes: m.yes, closeTs: m.closeTs, vol: m.vol, _bid: m.bid, _ask: m.ask }));\n          this.dataMode = \"live\"; this.liveSource = \"KALSHI\"; this.kalshiBase = \"/api/kalshi\"; this.feedFnOk = true;\n          diag.push(\"QUICK CONNECT via feed fn: \" + this.livePool.length + \" markets\");\n          this.pushEvent(\"\\u27f3\", \"#4fce7f\", \"quick connect \\u00b7 \" + this.livePool.length + \" markets (server feed)\", { kind: \"feed\", coalesce: true });\n          this.setState({ rev: this.state.rev + 1 });\n        } else {\n          for (const qb of [\"/api/kalshi\", KBASE]) {\n            const j = await this.fetchJson(qb + \"/markets?limit=1000&status=open\" + W, 8000).catch(() => null);\n            const pool = j ? this.mapKalshi({ markets: j.markets || [] }) : [];\n            if (pool.length >= 3) {\n              this.livePool = pool; this.dataMode = \"live\"; this.liveSource = \"KALSHI\"; this.kalshiBase = qb;\n              diag.push(\"QUICK CONNECT: \" + pool.length + \" markets \\u2014 full sweep upgrading in background\");\n              this.pushEvent(\"\\u27f3\", \"#4fce7f\", \"quick connect \\u00b7 \" + pool.length + \" markets \\u2014 full sweep running\", { kind: \"feed\", coalesce: true });\n              this.setState({ rev: this.state.rev + 1 });\n              break;\n            }\n          }\n        }\n      } catch (e) {}\n    }\n    const laneWindow = async (base, wrap) => {\n      let cursor = \"\", raw = [], pages = 0;\n      do {\n        const u0 = base + \"/markets?limit=1000&status=open\" + W + (cursor ? \"&cursor=\" + encodeURIComponent(cursor) : \"\");\n        const j = await this.fetchJson(wrap ? wrap(u0) : u0, wrap ? 18000 : 12000);\n        raw = raw.concat(j.markets || []);\n        cursor = j.cursor || \"\";\n        pa  // ACCUMULATE across sweeps: a serverless feed instance can return a partial\n      // ladder (cold start / time-boxed) — merge into the running watchlist instead\n      // of replacing it; prune only what closed or went unconfirmed for 30 min\n      const seenAt = this.poolSeen = this.poolSeen || {};\n      const nowT3 = Date.now();\n      const mergedBy = {};\n      (this.livePool || []).forEach(m => { mergedBy[m.ticker] = m; });\n      winner.pool.forEach(m => { mergedBy[m.ticker] = m; seenAt[m.ticker] = nowT3; });\n      this.livePool = Object.values(mergedBy).filter(m => m.closeTs > nowT3 + 4 * 60000 && nowT3 - (seenAt[m.ticker] = seenAt[m.ticker] || nowT3) < 30 * 60000);\n      const nSp = this.livePool.filter(m => m.c === \"SPORTS\").length;\n      this.pushEvent(\"\\u27f3\", \"#5aa7e8\", \"feed connected \\u00b7 KALSHI \\u00b7 \" + this.livePool.length + \" markets watched (\" + nSp + \" sports \\u00b7 \" + winner.pool.length + \" in this sweep)\", { kind: \"feed\", coalesce: true });\n      this.dataMode = \"live\";\n      this.liveSource = winner.name;\n      this.kalshiBase = winner.base;\n      clearTimeout(this.refetchT);\n      let refetchIn = this.feedFnOk ? 60000 : 180000; // ladder feed is ONE request — poll every 60s so the server keeps climbing rungs; direct tri-lane sweeps stay at 3 min\n      if (!this.horizon) {\n        // AUTO horizon: what matters is how many markets settle INSIDE the entry\n        // window \\u2014 a rich watchlist that all settles hours out still means zero\n        // tradable candidates (T-MINUS blocks everything). Widen on entry-window\n        // scarcity; tighten only when the smaller window is itself well-stocked.\n        const tiers = [60, 240, 720, 1440];\n        const i = tiers.indexOf(this.effHorizon || 60);\n        const nowT2 = Date.now();\n        const hLbl = h => h >= 60 ? (h / 60) + \"h\" : h + \"m\";\n        const inWin = h => (this.livePool || []).filter(m => { const fav = Math.max(m.yes, 100 - m.ye ;\n    const nowT = Date.now();\n    const held = {};\n    ((this.log && this.log.bets) || []).forEach(b => { if (!b.result && b.ticker) held[b.ticker] = 1; });\n    const isHot = m => held[m.ticker] || (m.closeTs - nowT <= 2 * 3600000 && Math.max(m.yes, 100 - m.yes) >= 60 && Math.max(m.yes, 100 - m.yes) <= 96);\n    const src = hotOnly ? this.livePool.filter(isHot) : this.livePool.slice();\n    const tickers = src.sort((a, b) => a.closeTs - b.closeTs).map(m => m.ticker).filter(Boolean).slice(0, hotOnly ? 90 : 280);\n    if (!tickers.length) return;\n    const byT = {};\n    if (this.feedFnOk) {\n      // server quote lane: 90 tickers per request, one upstream call each\n      for (let i = 0; i < tickers.length; i += 90) {\n        const j = await this.fetchJson(\"/api/feed?tickers=\" + encodeURIComponent(tickers.slice(i, i + 90).join(\",\")), 9000).catch(() => null);\n        if (j && j.quotes) Object.keys(j.quotes).forEach(k => { const q = j.quotes[k]; byT[k] = { yes_bid: q.bid, yes_ask: q.ask, last_price: q.yes }; });\n      }\n    } else {\n      for (let i = 0; i < tickers.length; i += 40) {\n        const j = await this.fetchJson(this.kalshiBase + \"/markets?limit=100&tickers=\" + encodeURIComponent(tickers.slice(i, i + 40).join(\",\")), 9000).catch(() => null);\n        ((j && j.markets) || []).forEach(m => { byT[m.ticker] = m; });\n      }\n    }\n    const num = v => { const x = parseFloat(v); return isFinite(x) ? x : 0; };\n    const cents = (c, d) => { const x = num(c); if (x > 0) return Math.round(x); return Math.round(num(d) * 100); };\n    let n = 0;\n    this.livePool.forEach(m => {\n      const r = byT[m.ticker];\n      if (!r) return;\n      const bid = cents(r.yes_bid, r.yes_bid_dollars);\n      const ask = cents(r.yes_ask, r.yes_ask_dollars) || 100;\n      const last = cents(r.last_price, r.last_price_dollars);\n      const yes = last > 0 ? last : Math.round((bid + ask) / 2);\n      if (yes >= 1 && yes <= 99) { m.yes = yes; m._bid = bid; m._ask = ask; n++; }\n    });\n    if (n && !hotOnly) this.pushEvent(\"\\u21bb\", \"#5c6474\", \"quote refresh \\u00b7 \" + n + \" markets re-priced\", { kind: \"quotes\", coalesce: true });\n    else if (n && hotOnly) this.pushEvent(\"\\u21bb\", \"#5c6474\", \"hot lane \\u00b7 \" + n + \" time-critical markets re-priced (15s cadence)\", { kind: \"quotes\", coalesce: true });\n    // react to fresh tape NOW: sweep immediately after new quotes land instead of\n    // waiting up to 5s for the next tick — cuts worst-case reaction time ~25%\n    if (n && !this.isServerMode()) { this.lastScan = 0; if (this.scan(Date.now())) this.setState({ rev: this.state.rev + 1 }); }\n  }\n\n  // Direct probe of the fast crypto series (15-min / hourly / daily). Used when a\n  // sweep comes back with ZERO crypto \\u2014 these series always exist, so their absence\n  // means the window sweep missed them (pagination cap), not that they're gone.\n  async supplementCrypto(base) {\n    if (this._cryptoSupTs && Date.now() - this._cryptoSupTs < 120000) return;\n    this._cryptoSupTs = Date.now();\n    const series = [\"KXBTC15M\", \"KXETH15M\", \"KXSOL15M\", \"KXXRP15M\", \"KXBTCD\", \"KXETHD\", \"KXBTC\", \"KXETH\"];\n    const raw = [];\n    try {\n      for (let i = 0; i < series.length; i += 4) {\n        const rs = await Promise.all(series.slice(i, i + 4).map(s =>\n          this.fetchJson(base + \"/markets?limit=100&status=open&series_ticker=\" + s, 9000).catch(() => null)));\n        rs.forEach(j => { if (j && j.markets) raw.push.apply(raw, j.markets); });\n        if (i + 4 < series.length) await new Promise(r => setTimeout(r, 400));\n      }\n    } catch (e) {}\n    const pool = this.mapKalshi({ markets: raw }).filter(m => m.c === \"CRYPTO\");\n    if (!pool.length) { this.pushEvent(\"\\u27f3\", \"#eab54e\", \"crypto probe: no fast crypto markets reachable right now\", { kind: \"cryptosup\", coalesce: true }); return; }\n    if (!this.livePool) this.livePool = [];\n    const seen = {};\n    this.livePool.forEach(m => { seen[m.ticker] = 1; });\n    const add = pool.filter(m => !seen[m.ticker]);\n    if (add.length) {\n      this.livePool = this.livePool.concat(add);\n      this.pushEvent(\"\\u27f3\", \"#4fce7f\", \"crypto probe: +\" + add.length + \" fast crypto markets merged into watchlist\", { kind: \"cryptosup\", coalesce: true });\n      this.setState({ rev: this.state.rev + 1 });\n    }\n  }\n\n  parsePool(text) {\n    const nowT = Date.now();\n    return text.split(\"\\n\").map(l => l.trim()).filter(Boolean).map(l => {\n      const parts = l.split(\"|\").map(s => s.trim());\n      if (parts.length < 2 || !parts[0]) return null;\n      const yes = Math.round(parseFloat(parts[1]));\n      if (!(yes >= 1 && yes <= 99)) return null;\n      const mins = Math.max(6, Math.min(60, parseInt(parts[3], 10) || 45));\n      return { t: parts[0], c: (parts[2] || \"MARKET\").toUpperCase(), yes, ticker: \"\", vol: 5000, closeTs: nowT + mins * 60000 };\n    }).filter(Boolean);\n  }\n\n  // Real data only: live feed or user-pasted markets. No simulated listings.\n  markets() {\n    if (this.customPool && this.customPool.length) return this.customPool;\n    if (this.livePool && this.livePool.length) return this.livePool;\n    return [];\n  }\n\n  horizonMins() { if (!this.horizon) return this.effHorizon || 60; return this.horizon; }\n\n  catColor(c) {\n    return { ECON: \"#5aa7e8\", CRYPTO: \"#c792ea\", COMMOD: \"#eab54e\", SPORTS: \"#4fce7f\", \"M&A\": \"#e864a0\", AI: \"#57c8c0\", POLITICS: \"#e8875a\", WEATHER: \"#57c8c0\", MARKET: \"#8b93a3\" }[c] || \"#8b93a3\";\n  }\n\n  // ===== LEARNING MODULE =====\n  // Recomputed from the settled log every 30s. Three mechanisms, all data-driven:\n  //   A. CALIBRATION — if bets win less often than their price implies, every new\n  //      entry must show that shortfall as EXTRA net edge (up to +4c).\n  //   B. CATEGORY ADJUST — per-category Bayesian-shrunk win rate vs expected;\n  //      underperforming categories demand extra edge (up to +5c more).\n  //   C. COOLDOWNS — 3 straight losses in a category blocks it for 2h;\n  //      5 straight losses overall halts ALL entries for 1h (circuit breaker).\n  // Real-settled and manual results count double vs simulated ones.\n  learnModel(now) {\n    if (this._lm && now - this._lmTs < 30000) return this._lm;\n    const bets = ((this.log && this.log.bets) || []).filter(b => b.result === \"won\" || b.result === \"lost\");\n    const wOf = b => (b.settledBy === \"real\" || b.settledBy === \"manual\") ? 2 : 1;\n    const expOf = b => Math.min(0.95, b.pc / 100 + 0.02);\n    let n = 0, w = 0, exp = 0, rn = 0, rw = 0;\n    bets.forEach(b => {\n      const wt = wOf(b);\n      n += wt; w += (b.result === \"won\" ? wt : 0); exp += wt * expOf(b);\n      rn++; rw += b.result === \"won\" ? 1 : 0;\n    });\n    const shortfall = n > 0 ? Math.max(0, (exp - w) / n) : 0;\n    const calib = Math.round(Math.min(4, shortfall * 100 * (n / (n + 20))) * 10) / 10;\n    // per-category aggregates\n    const cat = {};\n    bets.forEach(b => {\n      const wt = wOf(b);\n      const c = cat[b.cat] = cat[b.cat] || { n: 0, w: 0, exp: 0, rn: 0, rw: 0 };\n      c.n += wt; c.w += (b.result === \"won\" ? wt : 0); c.exp += wt * expOf(b);\n      c.rn++; c.rw += b.result === \"won\" ? 1 : 0;\n    });\n    const bandOf = pc2 => pc2 >= 86 ? \"86\\u00a2+\" : pc2 >= 80 ? \"80\\u201385\\u00a2\" : pc2 >= 70 ? \"70\\u201379\\u00a2\" : \"<70\\u00a2\";\n    const bandStats = {};\n    bets.forEach(b => {\n      const wt = wOf(b);\n      const k = bandOf(b.pc);\n      const c = bandStats[k] = bandStats[k] || { n: 0, w: 0, exp: 0, rn: 0, rw: 0 };\n      c.n += wt; c.w += (b.result === \"won\" ? wt : 0); c.exp += wt * expOf(b);\n      c.rn++; c.rw += b.result === \"won\" ? 1 : 0;\n    });\n    const bandAdj = {};\n    Object.keys(bandStats).forEach(k => {\n      const c = bandStats[k];\n      const expRate = c.exp / c.n;\n      const adjRate = (c.w + 2 * expRate) / (c.n + 2);\n      const short = Math.max(0, expRate - adjRate);\n      bandAdj[k] = {\n        extra: Math.round(Math.min(4, short * 100 * (c.n / (c.n + 8))) * 10) / 10,\n        mult: Math.max(0.6, Math.min(1.25, adjRate / Math.max(expRate, 0.05))),\n        rec: c.rw + \"\\u2013\" + (c.rn - c.rw)\n      };\n    });\n    const catAdj = {};\n    Object.keys(cat).forEach(k => {\n      const c = cat[k];\n      const expRate = c.exp / c.n;\n      const adjRate = (c.w + 2 * expRate) / (c.n + 2); // Bayesian shrink toward expected\n      const short = Math.max(0, expRate - adjRate);\n      catAdj[k] = {\n        extra: Math.round(Math.min(5, short * 100 * (c.n / (c.n + 8))) * 10) / 10,\n        mult: Math.max(0.6, Math.min(1.25, adjRate / Math.max(expRate, 0.05))),\n        rec: c.rw + \"\\u2013\" + (c.rn - c.rw)\n      };\n    });\n    // loss-streak cooldowns\n    const byCat = {};\n    bets.slice().sort((a, b) => a.closeTs - b.closeTs).forEach(b => { (byCat[b.cat] = byCat[b.cat] || []).push(b); });\n    const blocked = {};\n    Object.keys(byCat).forEach(k => {\n      const arr = byCat[k];\n      let streak = 0, lastTs = 0;\n      for (let i = arr.length - 1; i >= 0; i--) {\n        if (arr[i].result === \"lost\") { streak++; lastTs = Math.max(lastTs, arr[i].closeTs); } else break;\n      }\n      if (streak >= 3 && now < lastTs + 2 * 3600000) blocked[k] = lastTs + 2 * 3600000;\n    });\n    const allS = bets.slice().sort((a, b) => a.closeTs - b.closeTs);\n    let gStreak = 0, gLast = 0;\n    for (let i = allS.length - 1; i >= 0; i--) {\n      if (allS[i].result === \"lost\") { gStreak++; gLast = Math.max(gLast, allS[i].closeTs); } else break;\n    }\n    const haltUntil = (gStreak >= 5 && now < gLast + 3600000) ? gLast + 3600000 : 0;\n    // PAYOFF-ASYMMETRY brake: one loss at 85¢ costs ~6 wins to recover; at 90¢, ~9.\n    // If the last 24h of settled bets (n≥6) win under 50%, entries ≥80¢ are OFF —\n    // the book is saying these favorites are NOT winning at favorite rates.\n    let n24 = 0, w24 = 0;\n    bets.forEach(b => { if ((b.closeTs || 0) > now - 86400000) { n24++; if (b.result === \"won\") w24++; } });\n    const hiCap = n24 >= 6 && (w24 / n24) < 0.5;\n    // human-readable summary\n    const remM = ts => Math.max(1, Math.ceil((ts - now) / 60000)) + \"m\";\n    const lines = [];\n    if (!rn) {\n      lines.push({ text: \"Collecting settled outcomes \\u2014 adjustments begin after the first results land.\", color: \"#7d8697\" });\n    } else {\n      const expDisp = (exp / (n / rn)).toFixed(1);\n      lines.push({ text: \"CALIBRATION: \" + rw + \"\\u2013\" + (rn - rw) + \" actual vs ~\" + expDisp + \" expected wins\" + (calib > 0 ? \" \\u2192 demanding +\" + calib + \"\\u00a2 extra edge on every entry\" : \" \\u2192 on target, no penalty\"), color: calib > 0 ? \"#eab54e\" : \"#4fce7f\" });\n      Object.keys(catAdj).sort((a, b) => catAdj[a].mult - catAdj[b].mult).slice(0, 4).forEach(k => {\n        const a = catAdj[k];\n        lines.push({ text: k + \": \" + a.rec + \" \\u00b7 form \\u00d7\" + a.mult.toFixed(2) + (a.extra > 0 ? \" \\u00b7 +\" + a.extra + \"\\u00a2 extra edge required\" : \"\"), color: a.mult >= 1 ? \"#4fce7f\" : \"#e8875a\" });\n      });\n      Object.keys(bandAdj).sort().forEach(k => {\n        const a = bandAdj[k];\n        lines.push({ text: \"BAND \" + k + \": \" + a.rec + \" \\u00b7 \\u00d7\" + a.mult.toFixed(2) + (a.extra > 0 ? \" \\u00b7 +\" + a.extra + \"\\u00a2 extra edge required\" : \"\"), color: a.mult >= 1 ? \"#4fce7f\" : \"#e8875a\" });\n      });\n      Object.keys(blocked).forEach(k => lines.push({ text: \"COOLDOWN: \" + k + \" blocked \" + remM(blocked[k]) + \" after 3 straight losses\", color: \"#e5636a\" }));\n      if (haltUntil) lines.push({ text: \"CIRCUIT BREAKER: all entries paused \" + remM(haltUntil) + \" after 5 straight losses\", color: \"#e5636a\" });\n      if (hiCap) lines.push({ text: \"ASYMMETRY BRAKE: \" + w24 + \"/\" + n24 + \" wins last 24h — entries ≥80¢ blocked (one 85¢ loss ≈ 6 wins to recover)\", color: \"#e5636a\" });\n    }\n    this._lm = { calib, catAdj, blocked, haltUntil, hiCap, lines,\n      reqEdge: (c, pc2) => Math.round((2.5 + calib + ((catAdj[c] && catAdj[c].extra) || 0) + ((pc2 != null && bandAdj[bandOf(pc2)] && bandAdj[bandOf(pc2)].extra) || 0)) * 10) / 10 };\n    this._lmTs = now;\n    return this._lm;\n  }\n\n  // ===== DOMAIN MODELS (researched) =====\n  // CRYPTO 15m/hourly binaries behave like 0DTE binary options:\n  //  - near expiry, 50-65c is the ATM zone: max gamma, coin-flip variance, max fee drag -> blocked\n  //  - ITM favorites earn time decay (pinning) IF the tape is stable; elevated 10-min\n  //    price range means premium stays uncertain until the final minutes -> extra edge required\n  //  - drift against the chosen side over the last 10 min is disqualifying; aligned drift helps\n  //  - time-vs-exposure: required edge scales with minutes held x instability\n  // WEATHER daily-high markets are diurnal and monotonic: the high only ratchets UP.\n  //  - \"stays under\" (NO) bets are blocked from morning until the afternoon peak has passed\n  //  - \"goes above\" (YES) bets before ~1pm local are forecast bets -> extra edge required\n  //  - after the peak the outcome is mostly locked; historically extreme-priced weather\n  //    markets settled true ~98% of the time and certainty tends to be under-priced ->\n  //    late-day favorites allowed up to 96c and given a small edge credit\n  domainLogic(m, side, pc, minsLeft, now) {\n    const tk = ((m.ticker || \"\") + \" \" + (m.t || \"\")).toUpperCase();\n    const hist = (this.pHist && this.pHist[m.ticker]) || [];\n    const past = hist.filter(h => h.ts <= now - 8 * 60000);\n    const old = past.length ? past[past.length - 1] : (hist[0] || null);\n    const range = hist.length >= 2 ? Math.max.apply(null, hist.map(h => h.yes)) - Math.min.apply(null, hist.map(h => h.yes)) : 0;\n    const drift = old ? m.yes - old.yes : 0;\n    const sideDrift = side === \"YES\" ? drift : -drift;\n    if (/KXBTC|KXETH|KXSOL|KXXRP|KXDOGE|BITCOIN|ETHEREUM|SOLANA/.test(tk)) {\n      // ONE crypto loss = 90-min crypto stand-down: the tape that just beat the desk\n      // is the same tape behind every other strike (the 3-strike rule never tripped\n      // on Jul 5 because the losses were spaced hours apart)\n      const cLoss = ((this.log && this.log.bets) || []).filter(b => b.cat === \"CRYPTO\" && b.result === \"lost\").reduce((mx, b) => Math.max(mx, b.closeTs || 0), 0);\n      if (cLoss && now - cLoss < 90 * 60000) return { ok: false, extra: 0, label: \"crypto: 90m stand-down after any crypto loss\", val: Math.ceil((cLoss + 90 * 60000 - now) / 60000) + \"m left\" };\n      if (pc < 66 && minsLeft <= 20) return { ok: false, extra: 0, label: \"crypto: <66\\u00a2 near expiry = ATM coin-flip (max gamma + fee drag)\", val: pc + \"\\u00a2@\" + Math.round(minsLeft) + \"m\" };\n      // research: time held = variance absorbed; a favorite's edge decays with exposure.\n      // long holds only allowed deep ITM (>=90\\u00a2) where the cushion covers the tape\n      if (minsLeft > 240 && pc < 90) return { ok: false, extra: 0, label: \"crypto: >4h hold below 90\\u00a2 \\u2014 too much tape variance for the cushion\", val: pc + \"\\u00a2@\" + (minsLeft / 60).toFixed(1) + \"h\" };\n      if (sideDrift <= -5) return { ok: false, extra: 0, label: \"crypto: tape moving against this side over last 10m\", val: sideDrift + \"\\u00a2/10m\" };\n      // NEAR-STRIKE GAMMA ZONE: a favorite priced in the 70s-80s with under an hour\n      // left is priced there BECAUSE the strike is within ordinary tape reach — every\n      // Jul 5 crypto loss lived here. Only a >=90\\u00a2 cushion passes, or <90\\u00a2 with a\n      // dead-calm, aligned tape the desk has actually OBSERVED (\\u22643\\u00a2 range over 10m).\n      const tapeKnown = hist.length >= 3;\n      if (minsLeft <= 60 && pc < 90 && !(tapeKnown && range <= 3 && sideDrift >= 0)) {\n        return { ok: false, extra: 0, label: \"crypto: <90\\u00a2 near-strike gamma zone \\u2014 needs \\u226590\\u00a2 cushion or dead-calm aligned observed tape\", val: pc + \"\\u00a2 \\u00b7 \\u00b1\" + Math.round(range) + \"\\u00a2\" + (tapeKnown ? \"\" : \" \\u00b7 tape unobserved\") };\n      }\n      let extra = 0; const notes = [];\n      // overnight ET (2-7am): thin books + whipsaw regime — the Jul 5 losses (2:15am NO / 4:35am YES\n      // on the same BTC tape, both lost) happened here. Demand a real premium to trade it.\n      const etH2 = (new Date(now).getUTCHours() + 20) % 24;\n      if (etH2 >= 2 && etH2 < 7) { extra += 2.5; notes.push(\"overnight ET tape (2\\u20137am) \\u2014 thin books, whipsaw regime\"); }\n      if (range >= 10) { extra += 2.5; notes.push(\"elevated vol regime (\\u00b1\" + Math.round(range) + \"\\u00a2/10m) \\u2014 premium stays uncertain till the last minutes\"); }\n      else if (range >= 6) { extra += 1; notes.push(\"moderate vol (\\u00b1\" + Math.round(range) + \"\\u00a2/10m)\"); }\n      if (sideDrift >= 4) { extra -= 0.5; notes.push(\"tape momentum aligned (+\" + sideDrift + \"\\u00a2/10m)\"); }\n      extra += Math.min(2, (minsLeft / 60) * (range / 12)); // exposure-time tax in unstable regimes\n      return { ok: true, extra: Math.round(extra * 10) / 10, label: \"crypto 0DTE: ITM favorite + stable tape wins by time decay\", val: \"\\u00b1\" + Math.round(range) + \"\\u00a2 \" + (sideDrift >= 0 ? \"+\" : \"\") + sideDrift + \"\\u00a2\", note: notes.join(\"; \") };\n    }\n    if (/KXHIGH|KXLOW|KXTEMP|HIGH TEMP|LOW TEMP/.test(tk)) {\n      // WEATHER RE-ENABLED (v97) — post-peak lock-in lane ONLY. Why it failed before:\n      // the desk was making FORECAST bets (morning entries on a model temp). But daily\n      // temp extremes are monotonic — the high only ratchets UP, the low only ratchets\n      // DOWN — so after the diurnal turn the outcome is physics, not forecast, and\n      // extreme-priced weather markets have settled true ~98% of the time. Safeguards\n      // (reusing the crypto/sports framework):\n      //   1. SHORT WINDOW — market must close within 5h; no long forecast exposure\n      //   2. CLOCK GATE — highs only after 3pm local station time, lows after 9am\n      //   3. 85–96¢ favorites only (near-certainties; certainty is under-priced late)\n      //   4. OBSERVED-STABLE BOOK — 3+ samples, ≤5¢/10m range, no adverse drift\n      //   5. MAX 1 open weather position · 24h stand-down after any weather loss\n      const wBets = ((this.log && this.log.bets) || []).filter(b => b.cat === \"WEATHER\");\n      const wLoss = wBets.filter(b => b.result === \"lost\").reduce((mx, b) => Math.max(mx, b.closeTs || 0), 0);\n      if (wLoss && now - wLoss < 24 * 3600000) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: 24h stand-down after a weather loss\", val: Math.ceil((wLoss + 24 * 3600000 - now) / 3600000) + \"h left\" };\n      if (wBets.some(b => !b.result)) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: max 1 open weather position\", val: \"slot full\" };\n      // local station hour from the ticker's city code (July = DST offsets)\n      const cm = (m.ticker || \"\").toUpperCase().match(/KX(?:HIGH|LOW|TEMP)([A-Z]+)/);\n      const city = cm ? cm[1].replace(/-.*/, \"\") : \"\";\n      const off = /NY|PHIL|MIA|DC|BOS|ATL/.test(city) ? -4 : /CHI|AUS|HOU|MIN|DAL|NASH/.test(city) ? -5 : /DEN/.test(city) ? -6 : /LAX|SEA|SF|PHX|VEGAS|LV|PORT/.test(city) ? -7 : -4;\n      const locH = ((new Date(now).getUTCHours() + 24 + off) % 24) + new Date(now).getUTCMinutes() / 60;\n      const isLow = /KXLOW|LOW TEMP/.test(tk);\n      if (!isLow && locH < 15) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: daily high not locked until the ~3pm-local diurnal peak — morning entries are forecast bets (the old failure mode)\", val: city + \" \" + Math.floor(locH) + \":00 local\" };\n      if (isLow && locH < 9) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: daily low is set near sunrise — locked after ~9am local\", val: city + \" \" + Math.floor(locH) + \":00 local\" };\n      if (pc < 85) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: <85¢ — post-peak lane trades near-certainties only\", val: pc + \"¢\" };\n      if (minsLeft > 300) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: closes >5h out — shortened window, no long exposure\", val: (minsLeft / 60).toFixed(1) + \"h\" };\n      if (hist.length < 3) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: book not yet observed — need 3+ quote samples before entry\", val: \"tape unobserved\" };\n      if (range > 5) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: book unstable ±\" + Math.round(range) + \"¢/10m — a locked outcome does not reprice; movement means the extreme is still in play\", val: \"±\" + Math.round(range) + \"¢\" };\n      if (sideDrift <= -3) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: \"weather: book drifting against this side — late repricing = new information (temperature still ticking)\", val: sideDrift + \"¢/10m\" };\n      // OBSERVED-LOCK (v109): NWS station observations say what has ACTUALLY printed.\n      // Daily extremes are monotonic, so once the observed hi/lo crosses the strike\n      // the outcome is decided \\u2014 and if it hasn't, the side betting on a late cross\n      // after the diurnal turn is fighting physics. Fails open without obs data.\n      let wxCredit = 0, wxNote = \"\";\n      const stn = this.WX_STATIONS[city];\n      const wxe = stn ? this.wxExtremes(stn, off) : null;\n      const stw = this.parseStrike(m.t, m.ticker);\n      const lk = this.wxLock(isLow, stw, wxe, side, stn);\n      if (lk && lk.fail) return { ok: false, extra: 0, bandMin: 85, bandMax: 96, label: lk.fail.label, val: lk.fail.val };\n      if (lk && lk.credit) { wxCredit = lk.credit; wxNote = lk.note;
